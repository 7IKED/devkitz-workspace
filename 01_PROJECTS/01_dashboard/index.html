<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEVKiTZ™ — AI Developer Ecosystem</title>
    <meta name="description" content="DEVKiTZ™ — Vollständiges KI-Entwickler-Ökosystem mit 80+ Dashboard-Modulen">
    <style>
        body {
            background: #060608;
            color: #f0f0f2;
            font-family: 'Inter', system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        a { color: #fa1e4e; text-decoration: none; }
    </style>
    <script>
        // Gate Check: Authentifizierte User → Hub, Gäste → Gate
        try {
            var data = JSON.parse(localStorage.getItem('dkz_gate_token') || '{}');
            if (data.token && data.ts && (Date.now() - data.ts < 72*3600000)) {
                window.location.replace('hub/index.html');
            } else {
                window.location.replace('hub/gate.html');
            }
        } catch(e) {
            window.location.replace('hub/gate.html');
        }
    </script>
    <meta http-equiv="refresh" content="2;url=hub/gate.html">
</head>
<body>
    <p>Weiterleitung zu <a href="hub/gate.html">DEVKiTZ™</a>...</p>
</body>
</html>
