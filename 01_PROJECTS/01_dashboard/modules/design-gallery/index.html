<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="dkz-module" content="design-gallery">
    <title>&#127912; Design Gallery&#8482; — DkZ&#8482; UI Patterns</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../shared/dkz-theme.css">
    <style>
        :root{--bg:#060608;--card:#1a1a1c;--card2:#222226;--border:#2a2a2e;--text:#f6f6f7;--muted:#808080;--accent:#fa1e4e;--green:#00ff88;--blue:#55ACEE;--yellow:#FFB800;--purple:#a855f7;--glass:rgba(26,26,28,.85)}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
        body::before{content:"";position:fixed;top:-200px;left:-200px;width:500px;height:500px;background:radial-gradient(circle,rgba(168,85,247,.06),transparent 70%);pointer-events:none;z-index:0}
        header{position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);background:var(--glass);border-bottom:1px solid var(--border);padding:0 2rem;height:60px;display:flex;align-items:center;gap:1rem}
        .back{color:var(--muted);text-decoration:none;font-size:1.1rem}
        .logo{font-size:1.1rem;font-weight:900;background:linear-gradient(135deg,var(--green),var(--blue));background-clip:text;-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .ver{font-size:.6rem;color:var(--muted);padding:.15rem .4rem;border:1px solid var(--border);border-radius:4px;font-family:'JetBrains Mono',monospace}
        .hdr-r{margin-left:auto;display:flex;gap:.5rem;align-items:center}
        .filters{display:flex;gap:.4rem;padding:.75rem 2rem;background:var(--card);border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center}
        .fbtn{padding:.35rem .8rem;border:1px solid var(--border);border-radius:16px;background:rgba(255,255,255,.02);color:var(--muted);font-size:.7rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s}
        .fbtn:hover{border-color:var(--accent);color:var(--text)}
        .fbtn.active{background:var(--blue);border-color:var(--blue);color:#fff}
        .search{padding:.35rem .8rem;border:1px solid var(--border);border-radius:16px;background:var(--card2);color:var(--text);font-family:inherit;font-size:.7rem;outline:none;width:180px;margin-left:auto}
        .search:focus{border-color:var(--blue)}

        /* Tokens Section */
        .tokens{padding:1rem 2rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:.5rem;border-bottom:1px solid var(--border);background:rgba(0,0,0,.3);position:relative;z-index:1}
        .token{text-align:center;padding:.5rem;border-radius:8px;border:1px solid var(--border);background:var(--card);cursor:pointer;transition:all .2s}
        .token:hover{border-color:var(--blue);transform:scale(1.05)}
        .token-color{width:100%;height:28px;border-radius:5px;margin-bottom:.3rem}
        .token-name{font-size:.55rem;font-weight:700;color:var(--muted);font-family:'JetBrains Mono',monospace}
        .token-val{font-size:.5rem;color:var(--muted)}

        /* Grid */
        .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1.25rem;padding:1.5rem 2rem;position:relative;z-index:1}
        .dcard{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:all .35s;cursor:pointer}
        .dcard:hover{border-color:var(--blue);transform:translateY(-4px);box-shadow:0 10px 30px rgba(85,172,238,.12)}
        .dcard-preview{height:120px;padding:.75rem;display:flex;align-items:center;justify-content:center;background:var(--card2);position:relative;overflow:hidden}
        .dcard-info{padding:1rem}
        .dcard-name{font-size:.85rem;font-weight:800;margin-bottom:.2rem}
        .dcard-desc{font-size:.68rem;color:var(--muted);line-height:1.5;margin-bottom:.4rem}
        .dcard-cat{font-size:.55rem;padding:.15rem .4rem;border-radius:8px;font-weight:700;font-family:'JetBrains Mono',monospace;display:inline-block}
        .cat-component{background:rgba(0,255,136,.1);color:var(--green)}
        .cat-layout{background:rgba(85,172,238,.1);color:var(--blue)}
        .cat-pattern{background:rgba(255,184,0,.1);color:var(--yellow)}
        .cat-effect{background:rgba(168,85,247,.1);color:var(--purple)}
        .cat-typography{background:rgba(250,30,78,.1);color:var(--accent)}
        .dcard-actions{display:flex;gap:.4rem;margin-top:.5rem}
        .dact{padding:.25rem .6rem;border:1px solid var(--border);border-radius:6px;font-size:.6rem;color:var(--muted);cursor:pointer;background:none;font-family:inherit;transition:all .2s}
        .dact:hover{border-color:var(--blue);color:var(--text)}

        /* Live Preview Components */
        .prev-btn{padding:.35rem .7rem;border:none;border-radius:6px;font-size:.6rem;font-weight:700;cursor:pointer;font-family:inherit}
        .prev-badge{padding:.2rem .5rem;border-radius:10px;font-size:.55rem;font-weight:700}
        .prev-input{padding:.3rem .5rem;border:1px solid var(--border);border-radius:6px;background:rgba(0,0,0,.3);color:var(--text);font-size:.6rem;font-family:inherit;width:120px}
        .prev-progress{height:6px;border-radius:3px;background:var(--border);overflow:hidden;width:140px}
        .prev-progress-bar{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--blue))}

        .modal{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.85);backdrop-filter:blur(10px);align-items:center;justify-content:center}
        .modal.show{display:flex}
        .modal-box{background:var(--card);border:1px solid var(--border);border-radius:16px;width:90%;max-width:600px;padding:1.5rem;max-height:80vh;overflow-y:auto;position:relative}
        .modal-close{position:absolute;top:1rem;right:1rem;background:none;border:none;color:var(--muted);font-size:1.3rem;cursor:pointer}
        .modal-title{font-size:1.1rem;font-weight:900;margin-bottom:.5rem}
        .modal-desc{font-size:.8rem;color:var(--muted);margin-bottom:1rem;line-height:1.5}
        .modal-code{background:rgba(0,0,0,.5);border:1px solid var(--border);border-radius:8px;padding:.75rem;font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--green);cursor:pointer;white-space:pre-wrap;max-height:200px;overflow-y:auto}
        .modal-code:hover{border-color:var(--green)}
        .toast{position:fixed;bottom:2rem;right:2rem;background:var(--green);color:#000;padding:.6rem 1.2rem;border-radius:8px;font-size:.8rem;font-weight:700;transform:translateY(80px);transition:transform .3s;z-index:300}
        .toast.show{transform:translateY(0)}
        ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
        @media(max-width:768px){.grid{grid-template-columns:1fr}.tokens{grid-template-columns:repeat(auto-fill,minmax(80px,1fr))}}
    </style>
</head>
<body data-dkz-module="design-gallery" data-dkz-appid="DKZ-DSG-002" data-dkz-version="v0.01" data-dkz-title="Design Gallery" data-dkz-icon="&#127912;" data-dkz-separable="true">

         html:'<div class="stat">\n  <div class="stat-num">132</div>\n  <div class="stat-label">Module</div>\n</div>'},
        {id:15,name:'Timeline',cat:'effect',desc:'Vertikale Timeline mit Events',
         preview:'<div style="border-left:2px solid #2a2a2e;padding-left:.5rem;margin-left:.4rem"><div style="position:relative;margin-bottom:.3rem"><div style="position:absolute;left:-.7rem;top:.1rem;width:8px;height:8px;border-radius:50%;background:#fa1e4e"></div><div style="font-size:.5rem;font-weight:700">Event 1</div><div style="font-size:.4rem;color:#808080">10:00</div></div><div style="position:relative"><div style="position:absolute;left:-.7rem;top:.1rem;width:8px;height:8px;border-radius:50%;background:#55ACEE"></div><div style="font-size:.5rem;font-weight:700">Event 2</div><div style="font-size:.4rem;color:#808080">11:30</div></div></div>',
         css:'.timeline{border-left:2px solid var(--border);padding-left:1.5rem;margin-left:1rem}\n.timeline-item{position:relative;margin-bottom:1.5rem}\n.timeline-item::before{\n  content:"";\n  position:absolute;\n  left:-1.85rem;\n  top:.3rem;\n  width:10px;\n  height:10px;\n  border-radius:50%;\n  background:var(--accent);\n}\n.timeline-title{font-weight:800;font-size:.85rem}\n.timeline-time{font-size:.7rem;color:var(--muted)}',
         html:'<div class="timeline">\n  <div class="timeline-item">\n    <div class="timeline-title">Event</div>\n    <div class="timeline-time">10:00</div>\n  </div>\n</div>'}
    ];

    var dCurFilter='all';
    function dFilter(f,btn){dCurFilter=f;document.querySelectorAll('.fbtn').forEach(function(b){b.classList.remove('active')});btn.classList.add('active');dRender()}

    function renderTokens(){
        var h='';
        TOKENS.forEach(function(t){
            h+='<div class="token" onclick="dCopy(\''+t.name+': '+t.val+'\')" title="'+t.name+'">';
            h+='<div class="token-color" style="background:'+t.color+'"></div>';
            h+='<div class="token-name">'+t.name+'</div>';
            h+='<div class="token-val">'+t.val+'</div>';
            h+='</div>';
        });
        document.getElementById('tokenGrid').innerHTML=h;
    }

    function dRender(){
        var q=(document.getElementById('dsearch').value||'').toLowerCase();
        var items=PATTERNS.filter(function(p){
            if(dCurFilter!=='all'&&p.cat!==dCurFilter)return false;
            if(q&&p.name.toLowerCase().indexOf(q)<0&&p.desc.toLowerCase().indexOf(q)<0)return false;
            return true;
        });
        document.getElementById('dcount').textContent=items.length+' Patterns';
        var h='';
        items.forEach(function(p){
            h+='<div class="dcard" onclick="dOpenModal('+p.id+')">';
            h+='<div class="dcard-preview">'+p.preview+'</div>';
            h+='<div class="dcard-info">';
            h+='<div class="dcard-name">'+esc(p.name)+'</div>';
            h+='<div class="dcard-desc">'+esc(p.desc)+'</div>';
            h+='<span class="dcard-cat cat-'+p.cat+'">'+esc(p.cat)+'</span>';
            h+='<div class="dcard-actions">';
            h+='<button class="dact" onclick="event.stopPropagation();dCopy(PATTERNS['+(p.id-1)+'].css)">&#128203; CSS</button>';
            h+='<button class="dact" onclick="event.stopPropagation();dCopy(PATTERNS['+(p.id-1)+'].html)">&#128196; HTML</button>';
            h+='</div></div></div>';
        });
        document.getElementById('dgrid').innerHTML=h;
    }

    function dOpenModal(id){
        var p=PATTERNS.find(function(x){return x.id===id});if(!p)return;
        document.getElementById('dm-title').textContent=p.name;
        document.getElementById('dm-desc').textContent=p.desc;
        document.getElementById('dm-css').textContent=p.css;
        document.getElementById('dm-html').textContent=p.html;
        document.getElementById('dmodal').classList.add('show');
    }
    function dCloseModal(){document.getElementById('dmodal').classList.remove('show')}
    function dCopy(text){navigator.clipboard.writeText(text).then(function(){dToast('&#128203; Kopiert!')}).catch(function(){})}
    function dToast(m){var t=document.getElementById('dtoast');t.innerHTML=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2500)}

    document.addEventListener('keydown',function(e){if(e.key==='Escape')dCloseModal()});
    renderTokens();
    dRender();
    </script>

    <script src="../../shared/dkz-console.js"></script>
    <script src="../shared/dkz-autobug.js" defer></script>

<script src="../../shared/dkz-premium.js" defer></script>
