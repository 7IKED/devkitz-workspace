<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="dkz-version" content="v0.01.1_01">
    <title>Kontrollzentrum — DEVKiTZ™</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ═══════════════════════════════════════════════════
         * DkZ Design System — Kontrollzentrum
         * ═══════════════════════════════════════════════════ */
        :root {
            --accent: #fa1e4e;
            --bg: #060608;
            --surface: #0d0d10;
            --surface-2: #111116;
            --surface-3: #1a1a20;
            --border: rgba(255,255,255,0.06);
            --border-hover: rgba(255,255,255,0.12);
            --text: #e8e8ec;
            --text-dim: #71717a;
            --text-muted: #52525b;
            --green: #00ff88;
            --yellow: #ffb800;
            --red: #ff3b5c;
            --blue: #3b82f6;
            --cyan: #06b6d4;
            --radius: 14px;
            --radius-sm: 8px;
            --font: 'Inter', system-ui, -apple-system, sans-serif;
            --mono: 'JetBrains Mono', monospace;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ═══ Header ═══ */
        .kz-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            background: rgba(6,6,8,0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .kz-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .kz-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text);
        }

        .kz-subtitle {
            font-size: 0.65rem;
            color: var(--text-dim);
            font-family: var(--mono);
            letter-spacing: 0.05em;
        }

        .kz-ampel {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            flex-shrink: 0;
            transition: all 0.3s ease;
        }

        .kz-ampel.green {
            background: var(--green);
            box-shadow: 0 0 12px rgba(0,255,136,0.4);
        }
        .kz-ampel.yellow {
            background: var(--yellow);
            box-shadow: 0 0 12px rgba(255,184,0,0.4);
            animation: kzPulse 1.8s ease-in-out infinite;
        }
        .kz-ampel.red {
            background: var(--red);
            box-shadow: 0 0 16px rgba(255,59,92,0.5);
            animation: kzPulse 1s ease-in-out infinite;
        }

        @keyframes kzPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        .kz-header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .kz-btn {
            padding: 6px 14px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--surface-2);
            color: var(--text-dim);
            font-size: 0.72rem;
            font-family: var(--font);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .kz-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(250,30,78,0.05);
        }

        .kz-btn-primary {
            border-color: rgba(0,255,136,0.2);
            color: var(--green);
            background: rgba(0,255,136,0.05);
        }
        .kz-btn-primary:hover {
            border-color: var(--green);
            box-shadow: 0 0 8px rgba(0,255,136,0.15);
        }

        /* ═══ Main Grid ═══ */
        .kz-main {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto auto 1fr;
            gap: 16px;
            padding: 20px 24px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* ═══ Cards ═══ */
        .kz-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            transition: border-color 0.2s ease;
        }
        .kz-card:hover {
            border-color: var(--border-hover);
        }

        .kz-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
        }

        .kz-card-title {
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .kz-card-badge {
            font-size: 0.6rem;
            font-family: var(--mono);
            padding: 2px 8px;
            border-radius: 4px;
            background: var(--surface-3);
            color: var(--text-muted);
        }

        .kz-card-body {
            padding: 16px;
        }

        /* ═══ Score Card ═══ */
        .kz-score-card {
            grid-column: 1 / -1;
        }

        .kz-score-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
        }

        .kz-metric {
            text-align: center;
            padding: 16px 8px;
            background: var(--surface-2);
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
        }

        .kz-metric-num {
            font-family: var(--mono);
            font-size: 1.8rem;
            font-weight: 700;
            line-height: 1;
        }

        .kz-metric-label {
            font-size: 0.6rem;
            color: var(--text-dim);
            margin-top: 6px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        /* ═══ Live Feed ═══ */
        .kz-feed {
            grid-column: 1 / -1;
        }

        .kz-feed-list {
            max-height: 400px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .kz-feed-list::-webkit-scrollbar { width: 4px; }
        .kz-feed-list::-webkit-scrollbar-track { background: transparent; }
        .kz-feed-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }

        .kz-feed-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            font-size: 0.75rem;
            transition: background 0.15s ease;
            animation: kzFeedIn 0.3s ease-out;
        }
        .kz-feed-item:hover {
            background: var(--surface-2);
        }

        @keyframes kzFeedIn {
            from { opacity: 0; transform: translateX(-12px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .kz-feed-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .kz-feed-dot.info { background: var(--blue); }
        .kz-feed-dot.warn { background: var(--yellow); }
        .kz-feed-dot.error { background: var(--red); }
        .kz-feed-dot.critical { background: var(--red); box-shadow: 0 0 6px rgba(255,59,92,0.5); }
        .kz-feed-dot.success { background: var(--green); }

        .kz-feed-time {
            font-family: var(--mono);
            font-size: 0.6rem;
            color: var(--text-muted);
            flex-shrink: 0;
            width: 58px;
        }

        .kz-feed-source {
            font-family: var(--mono);
            font-size: 0.6rem;
            font-weight: 600;
            color: var(--cyan);
            flex-shrink: 0;
            width: 100px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .kz-feed-msg {
            flex: 1;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .kz-feed-severity {
            font-family: var(--mono);
            font-size: 0.55rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 1px 6px;
            border-radius: 3px;
            flex-shrink: 0;
        }
        .kz-feed-severity.info { color: var(--blue); background: rgba(59,130,246,0.1); }
        .kz-feed-severity.warn { color: var(--yellow); background: rgba(255,184,0,0.1); }
        .kz-feed-severity.error { color: var(--red); background: rgba(255,59,92,0.1); }
        .kz-feed-severity.critical { color: #fff; background: rgba(255,59,92,0.4); }

        /* ═══ EventLog Stats ═══ */
        .kz-stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .kz-stat-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            background: var(--surface-2);
            border-radius: var(--radius-sm);
            font-size: 0.72rem;
        }

        .kz-stat-label {
            color: var(--text-dim);
        }

        .kz-stat-val {
            font-family: var(--mono);
            font-weight: 600;
            color: var(--text);
        }

        /* ═══ Watchdog Config ═══ */
        .kz-config-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
        }
        .kz-config-row:last-child { border-bottom: none; }

        .kz-config-label {
            font-size: 0.72rem;
            color: var(--text-dim);
        }

        .kz-config-val {
            font-family: var(--mono);
            font-size: 0.72rem;
            color: var(--green);
            font-weight: 600;
        }

        .kz-level-btn {
            padding: 3px 10px;
            border-radius: 4px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-dim);
            font-size: 0.65rem;
            font-family: var(--mono);
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .kz-level-btn:hover { border-color: var(--accent); color: var(--accent); }
        .kz-level-btn.active {
            border-color: var(--accent);
            background: rgba(250,30,78,0.1);
            color: var(--accent);
        }

        /* ═══ Empty State ═══ */
        .kz-empty {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .kz-empty-icon {
            font-size: 2.5rem;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        /* ═══ Responsive ═══ */
        @media (max-width: 768px) {
            .kz-main {
                grid-template-columns: 1fr;
                padding: 12px;
            }
            .kz-score-grid {
                grid-template-columns: repeat(3, 1fr);
            }
            .kz-stats-grid {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>
<body>

    <!-- ═══ Header ═══ -->
    <header class="kz-header">
        <div class="kz-header-left">
            <div class="kz-ampel green" id="kz-ampel" title="System Status"></div>
            <div>
                <div class="kz-title">Kontrollzentrum</div>
                <div class="kz-subtitle">Watchdog · EventLog · AutoHealth</div>
            </div>
        </div>
        <div class="kz-header-actions">
            <button class="kz-btn kz-btn-primary" id="kz-btn-check" title="Kontrollschleife manuell ausfuehren">
                &#x1F504; Recheck
            </button>
            <button class="kz-btn" id="kz-btn-export" title="Alerts als JSON exportieren">
                &#x1F4E5; Export
            </button>
            <button class="kz-btn" id="kz-btn-clear" title="Alert-History leeren">
                &#x1F5D1; Clear
            </button>
        </div>
    </header>

    <!-- ═══ Main Grid ═══ -->
    <main class="kz-main">

        <!-- Score Card -->
        <div class="kz-card kz-score-card">
            <div class="kz-card-body">
                <div class="kz-score-grid" id="kz-score-grid">
                    <div class="kz-metric">
                        <div class="kz-metric-num" id="kz-score" style="color:var(--green)">—</div>
                        <div class="kz-metric-label">Health Score</div>
                    </div>
                    <div class="kz-metric">
                        <div class="kz-metric-num" id="kz-alerts-total" style="color:var(--text)">0</div>
                        <div class="kz-metric-label">Alerts Total</div>
                    </div>
                    <div class="kz-metric">
                        <div class="kz-metric-num" id="kz-errors" style="color:var(--red)">0</div>
                        <div class="kz-metric-label">Errors</div>
                    </div>
                    <div class="kz-metric">
                        <div class="kz-metric-num" id="kz-warnings" style="color:var(--yellow)">0</div>
                        <div class="kz-metric-label">Warnings</div>
                    </div>
                    <div class="kz-metric">
                        <div class="kz-metric-num" id="kz-checks" style="color:var(--cyan)">0</div>
                        <div class="kz-metric-label">Checks Run</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Live Alert Feed -->
        <div class="kz-card kz-feed">
            <div class="kz-card-header">
                <span class="kz-card-title">&#x1F6A8; Live Alert Feed</span>
                <span class="kz-card-badge" id="kz-feed-count">0 alerts</span>
            </div>
            <div class="kz-card-body">
                <div class="kz-feed-list" id="kz-feed-list">
                    <div class="kz-empty">
                        <div class="kz-empty-icon">&#x1F6E1;</div>
                        <div>Keine Alerts — alle Systeme laufen.</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- EventLog Stats -->
        <div class="kz-card">
            <div class="kz-card-header">
                <span class="kz-card-title">&#x1F4CA; EventLog Stats</span>
                <span class="kz-card-badge" id="kz-eventlog-total">0 events</span>
            </div>
            <div class="kz-card-body">
                <div class="kz-stats-grid" id="kz-stats-grid">
                    <div class="kz-stat-item">
                        <span class="kz-stat-label">Laden...</span>
                        <span class="kz-stat-val">—</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Watchdog Config -->
        <div class="kz-card">
            <div class="kz-card-header">
                <span class="kz-card-title">&#x2699; Watchdog Config</span>
                <span class="kz-card-badge" id="kz-wd-status">offline</span>
            </div>
            <div class="kz-card-body">
                <div id="kz-config-body">
                    <div class="kz-config-row">
                        <span class="kz-config-label">Intervall</span>
                        <span class="kz-config-val" id="kz-cfg-interval">30s</span>
                    </div>
                    <div class="kz-config-row">
                        <span class="kz-config-label">Min. Level</span>
                        <span id="kz-cfg-level-btns">
                            <button class="kz-level-btn" data-level="info">info</button>
                            <button class="kz-level-btn active" data-level="warn">warn</button>
                            <button class="kz-level-btn" data-level="error">error</button>
                        </span>
                    </div>
                    <div class="kz-config-row">
                        <span class="kz-config-label">Custom Checks</span>
                        <span class="kz-config-val" id="kz-cfg-custom">0</span>
                    </div>
                    <div class="kz-config-row">
                        <span class="kz-config-label">Letzter Check</span>
                        <span class="kz-config-val" id="kz-cfg-lastcheck">—</span>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <!-- ═══ Shared Scripts ═══ -->
    <script src="../../shared/dkz-eventbus.js"></script>
    <script src="../../shared/dkz-eventlog.js"></script>
    <script src="../../shared/dkz-toast.js"></script>
    <script src="../../shared/dkz-autohealth.js"></script>
    <script src="../../shared/dkz-health.js"></script>
    <script src="../../shared/dkz-liveticker.js"></script>
    <script src="../../shared/dkz-watchdog.js"></script>
    <script src="../../shared/dkz-navbar.js"></script>

    <script>
    /* ═══════════════════════════════════════════════════
     * Kontrollzentrum — Dashboard Logic
     * ═══════════════════════════════════════════════════ */
    (function () {
        'use strict';

        /* XSS-Schutz */
        function esc(str) {
            if (str == null) return '';
            var d = document.createElement('div');
            d.textContent = String(str);
            return d.innerHTML;
        }

        /* ─── DOM Refs ─── */
        var ampelEl = document.getElementById('kz-ampel');
        var scoreEl = document.getElementById('kz-score');
        var alertsTotalEl = document.getElementById('kz-alerts-total');
        var errorsEl = document.getElementById('kz-errors');
        var warningsEl = document.getElementById('kz-warnings');
        var checksEl = document.getElementById('kz-checks');
        var feedListEl = document.getElementById('kz-feed-list');
        var feedCountEl = document.getElementById('kz-feed-count');
        var statsGridEl = document.getElementById('kz-stats-grid');
        var eventlogTotalEl = document.getElementById('kz-eventlog-total');
        var wdStatusEl = document.getElementById('kz-wd-status');
        var cfgIntervalEl = document.getElementById('kz-cfg-interval');
        var cfgCustomEl = document.getElementById('kz-cfg-custom');
        var cfgLastcheckEl = document.getElementById('kz-cfg-lastcheck');

        /* ─── Ampel aktualisieren ─── */
        function updateAmpel(health) {
            ampelEl.className = 'kz-ampel ' + (health || 'green');
            ampelEl.title = 'System: ' + (health || 'unknown').toUpperCase();
        }

        /* ─── Score Metrics aktualisieren ─── */
        function updateMetrics() {
            if (!window.DkzWatchdog) {
                wdStatusEl.textContent = 'offline';
                return;
            }

            var status = window.DkzWatchdog.getStatus();
            var stats = window.DkzWatchdog.getStats();

            // Ampel
            updateAmpel(status.health);

            // Score
            var score = status.score || 0;
            scoreEl.textContent = score;
            scoreEl.style.color = score >= 80 ? 'var(--green)' : score >= 50 ? 'var(--yellow)' : 'var(--red)';

            // Counts
            alertsTotalEl.textContent = stats.total;
            errorsEl.textContent = (stats.bySeverity.error || 0) + (stats.bySeverity.critical || 0);
            warningsEl.textContent = stats.bySeverity.warn || 0;
            checksEl.textContent = stats.checksRun;

            // Watchdog Config
            wdStatusEl.textContent = stats.running ? 'aktiv' : 'gestoppt';
            wdStatusEl.style.color = stats.running ? 'var(--green)' : 'var(--red)';
            cfgIntervalEl.textContent = (stats.interval / 1000) + 's';
            cfgCustomEl.textContent = stats.customChecks;

            if (status.lastCheck) {
                var d = new Date(status.lastCheck);
                cfgLastcheckEl.textContent = d.toLocaleTimeString('de-DE', {
                    hour: '2-digit', minute: '2-digit', second: '2-digit'
                });
            }

            // Level-Buttons aktiv setzen
            var levelBtns = document.querySelectorAll('.kz-level-btn');
            for (var i = 0; i < levelBtns.length; i++) {
                levelBtns[i].classList.toggle('active', levelBtns[i].getAttribute('data-level') === stats.level);
            }
        }

        /* ─── Alert Feed rendern ─── */
        function renderFeed() {
            if (!window.DkzWatchdog) return;

            var alerts = window.DkzWatchdog.getAlerts(50);
            feedCountEl.textContent = alerts.length + ' alerts';

            if (alerts.length === 0) {
                feedListEl.innerHTML = '<div class="kz-empty"><div class="kz-empty-icon">&#x1F6E1;</div><div>Keine Alerts — alle Systeme laufen.</div></div>';
                return;
            }

            // Neueste zuerst
            var html = '';
            for (var i = alerts.length - 1; i >= 0; i--) {
                var a = alerts[i];
                var dotClass = a.severity || 'info';
                if (a.deduplicated) dotClass = 'info'; // Deduplizierte abgeschwaechen

                html += '<div class="kz-feed-item">';
                html += '<span class="kz-feed-dot ' + esc(dotClass) + '"></span>';
                html += '<span class="kz-feed-time">' + esc(a.timestampLocal || '') + '</span>';
                html += '<span class="kz-feed-source">' + esc(a.source || 'system') + '</span>';
                html += '<span class="kz-feed-msg">' + esc(a.message || '') + '</span>';
                html += '<span class="kz-feed-severity ' + esc(a.severity || 'info') + '">' + esc(a.severity || 'info') + '</span>';
                html += '</div>';
            }
            feedListEl.innerHTML = html;
        }

        /* ─── EventLog Stats rendern ─── */
        function renderEventLogStats() {
            if (!window.DkzEventLog) {
                eventlogTotalEl.textContent = 'offline';
                return;
            }

            var stats = window.DkzEventLog.getStats();
            eventlogTotalEl.textContent = stats.total + ' events';

            var html = '';

            // By Type
            var types = stats.types || {};
            var typeKeys = Object.keys(types).sort(function (a, b) { return types[b] - types[a]; });
            for (var i = 0; i < Math.min(typeKeys.length, 6); i++) {
                html += '<div class="kz-stat-item">';
                html += '<span class="kz-stat-label">' + esc(typeKeys[i]) + '</span>';
                html += '<span class="kz-stat-val">' + esc(String(types[typeKeys[i]])) + '</span>';
                html += '</div>';
            }

            // By Top Sources
            var sources = stats.sources || {};
            var srcKeys = Object.keys(sources).sort(function (a, b) { return sources[b] - sources[a]; });
            for (var j = 0; j < Math.min(srcKeys.length, 3); j++) {
                html += '<div class="kz-stat-item">';
                html += '<span class="kz-stat-label">src:' + esc(srcKeys[j]) + '</span>';
                html += '<span class="kz-stat-val">' + esc(String(sources[srcKeys[j]])) + '</span>';
                html += '</div>';
            }

            if (html) {
                statsGridEl.innerHTML = html;
            }
        }

        /* ─── Alles aktualisieren ─── */
        function refreshAll() {
            updateMetrics();
            renderFeed();
            renderEventLogStats();
        }

        /* ─── Event Listeners ─── */

        // Recheck Button
        document.getElementById('kz-btn-check').addEventListener('click', function () {
            if (window.DkzWatchdog) {
                window.DkzWatchdog.check();
                if (window.DkzToast) window.DkzToast.success('Kontrollschleife ausgefuehrt', 'kontrollzentrum');
            }
            refreshAll();
        });

        // Export Button
        document.getElementById('kz-btn-export').addEventListener('click', function () {
            if (!window.DkzWatchdog) return;
            var alerts = window.DkzWatchdog.getAlerts(200);
            var json = JSON.stringify(alerts, null, 2);
            var blob = new Blob([json], { type: 'application/json' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = 'dkz-alerts-' + new Date().toISOString().slice(0, 10) + '.json';
            a.click();
            URL.revokeObjectURL(url);
            if (window.DkzToast) window.DkzToast.info('Alerts exportiert', 'kontrollzentrum');
        });

        // Clear Button
        document.getElementById('kz-btn-clear').addEventListener('click', function () {
            if (window.DkzWatchdog) {
                window.DkzWatchdog.clearAlerts();
                if (window.DkzToast) window.DkzToast.info('Alert-History geleert', 'kontrollzentrum');
            }
            refreshAll();
        });

        // Level Buttons
        document.getElementById('kz-cfg-level-btns').addEventListener('click', function (e) {
            var btn = e.target.closest('.kz-level-btn');
            if (!btn) return;
            var level = btn.getAttribute('data-level');
            if (window.DkzWatchdog) {
                window.DkzWatchdog.setLevel(level);
                if (window.DkzToast) window.DkzToast.info('Level auf ' + level + ' gesetzt', 'watchdog');
            }
            refreshAll();
        });

        // Watchdog Alert Events → Live-Update
        document.addEventListener('dkz:watchdog:alert', function () {
            refreshAll();
        });

        // Health Updates → Refresh
        document.addEventListener('dkz:health-update', function () {
            refreshAll();
        });

        /* ─── Init ─── */
        // Warte bis Watchdog geladen
        function init() {
            refreshAll();
            // Auto-Refresh alle 10s
            setInterval(refreshAll, 10000);
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', function () { setTimeout(init, 1000); });
        } else {
            setTimeout(init, 1000);
        }

    })();
    </script>

    <script src="../shared/dkz-autobug.js" defer></script>

<script src="../../shared/dkz-premium.js" defer></script>
</body>
</html>
