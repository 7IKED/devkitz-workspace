<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="dkz-version" content="v1.00.0_01">
<title>DEVKiTZ Wiki — Ecosystem Knowledge Base</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#060608;--bg2:#0a0a0f;--surface:#0d0d14;--surface2:#12121c;
  --glass:rgba(255,255,255,0.03);--glass2:rgba(255,255,255,0.06);
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.12);
  --text:#e8e8f0;--text2:#8888a0;--text3:#555570;
  --accent:#fa1e4e;--green:#00ff88;--yellow:#ffb800;--red:#ff3b5c;
  --blue:#3b82f6;--purple:#a855f7;--cyan:#06b6d4;
  --font:'Inter',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);overflow-x:hidden;min-height:100vh}

/* === HEADER === */
.wiki-header{
  background:linear-gradient(135deg,var(--bg2),var(--surface));
  border-bottom:1px solid var(--border);
  padding:16px 24px;display:flex;align-items:center;gap:16px;
  position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);
}
.wiki-header .hub-btn{
  background:var(--glass2);border:1px solid var(--border2);border-radius:8px;
  color:var(--text);padding:8px 12px;text-decoration:none;font-size:13px;
  transition:all .2s;display:flex;align-items:center;gap:6px;
}
.wiki-header .hub-btn:hover{background:var(--accent);border-color:var(--accent)}
.wiki-header h1{font-size:20px;font-weight:700;background:linear-gradient(135deg,var(--green),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.wiki-header .search-box{
  margin-left:auto;background:var(--glass);border:1px solid var(--border);
  border-radius:8px;padding:8px 16px;color:var(--text);font-family:var(--font);
  font-size:13px;width:300px;outline:none;transition:border-color .2s;
}
.wiki-header .search-box:focus{border-color:var(--green)}

/* === LAYOUT === */
.wiki-layout{display:flex;height:calc(100vh - 60px)}
.wiki-sidebar{
  width:280px;min-width:280px;background:var(--bg2);border-right:1px solid var(--border);
  overflow-y:auto;padding:16px 0;
}
.wiki-main{flex:1;overflow-y:auto;padding:32px 48px;max-width:900px}
.wiki-toc{
  width:240px;min-width:240px;background:var(--bg2);border-left:1px solid var(--border);
  overflow-y:auto;padding:16px;display:none;
}
@media(min-width:1400px){.wiki-toc{display:block}}

/* === SIDEBAR NAV === */
.nav-section{margin-bottom:8px}
.nav-section-title{
  padding:8px 20px;font-size:11px;font-weight:600;text-transform:uppercase;
  letter-spacing:1.2px;color:var(--text3);cursor:pointer;
  display:flex;align-items:center;gap:8px;
}
.nav-section-title:hover{color:var(--text2)}
.nav-section-title .arrow{transition:transform .2s;font-size:10px}
.nav-section-title.collapsed .arrow{transform:rotate(-90deg)}
.nav-item{
  padding:6px 20px 6px 36px;font-size:13px;color:var(--text2);
  cursor:pointer;transition:all .15s;border-left:2px solid transparent;
  display:flex;align-items:center;gap:8px;
}
.nav-item:hover{color:var(--text);background:var(--glass)}
.nav-item.active{color:var(--green);border-left-color:var(--green);background:rgba(0,255,136,0.05)}
.nav-item .icon{font-size:14px;width:20px;text-align:center}
.nav-badge{
  margin-left:auto;background:var(--glass2);border-radius:10px;
  padding:1px 7px;font-size:10px;color:var(--text3);font-family:var(--mono);
}

/* === CONTENT === */
.wiki-content h1{font-size:32px;font-weight:900;margin-bottom:8px;background:linear-gradient(135deg,var(--accent),var(--yellow));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.wiki-content h2{font-size:22px;font-weight:700;margin:32px 0 12px;color:var(--text);padding-bottom:8px;border-bottom:1px solid var(--border)}
.wiki-content h3{font-size:16px;font-weight:600;margin:24px 0 8px;color:var(--cyan)}
.wiki-content p{font-size:14px;line-height:1.8;color:var(--text2);margin-bottom:16px}
.wiki-content code{
  background:var(--glass2);border:1px solid var(--border);border-radius:4px;
  padding:2px 6px;font-family:var(--mono);font-size:12px;color:var(--green);
}
.wiki-content pre{
  background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:16px;overflow-x:auto;margin:16px 0;font-family:var(--mono);font-size:12px;
  line-height:1.6;color:var(--text2);
}
.wiki-content table{width:100%;border-collapse:collapse;margin:16px 0;font-size:13px}
.wiki-content th{background:var(--surface);color:var(--text);padding:10px 12px;text-align:left;border:1px solid var(--border);font-weight:600}
.wiki-content td{padding:8px 12px;border:1px solid var(--border);color:var(--text2)}
.wiki-content tr:hover td{background:var(--glass)}

.wiki-content .info-box{
  background:linear-gradient(135deg,rgba(0,255,136,0.05),rgba(6,182,212,0.05));
  border:1px solid rgba(0,255,136,0.2);border-radius:8px;padding:16px;margin:16px 0;
}
.wiki-content .info-box .info-title{color:var(--green);font-weight:600;font-size:13px;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.wiki-content .warn-box{
  background:rgba(255,184,0,0.05);border:1px solid rgba(255,184,0,0.2);
  border-radius:8px;padding:16px;margin:16px 0;
}
.wiki-content .warn-box .warn-title{color:var(--yellow);font-weight:600;font-size:13px;margin-bottom:6px}

/* === TOC === */
.toc-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:12px}
.toc-item{
  padding:4px 0;font-size:12px;color:var(--text3);cursor:pointer;
  transition:color .15s;border-left:1px solid var(--border);padding-left:12px;
}
.toc-item:hover{color:var(--text)}
.toc-item.active{color:var(--green);border-left-color:var(--green)}
.toc-sub{padding-left:24px}

/* === STATS === */
.wiki-stats{
  display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:24px 0;
}
.stat-card{
  background:var(--glass);border:1px solid var(--border);border-radius:10px;
  padding:16px;text-align:center;transition:all .2s;
}
.stat-card:hover{border-color:var(--green);transform:translateY(-2px)}
.stat-card .stat-val{font-size:28px;font-weight:900;font-family:var(--mono);color:var(--green)}
.stat-card .stat-label{font-size:11px;color:var(--text3);margin-top:4px;text-transform:uppercase;letter-spacing:.5px}

/* === MODULE GRID === */
.module-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin:16px 0}
.mod-card{
  background:var(--glass);border:1px solid var(--border);border-radius:8px;
  padding:12px;cursor:pointer;transition:all .2s;
}
.mod-card:hover{border-color:var(--cyan);transform:translateY(-1px);box-shadow:0 4px 20px rgba(6,182,212,0.1)}
.mod-card .mod-icon{font-size:20px;margin-bottom:4px}
.mod-card .mod-name{font-size:12px;font-weight:600;color:var(--text)}
.mod-card .mod-desc{font-size:10px;color:var(--text3);margin-top:2px}

/* === ANIMATION === */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .4s ease forwards;opacity:0}
.fade-up:nth-child(2){animation-delay:.05s}
.fade-up:nth-child(3){animation-delay:.1s}
.fade-up:nth-child(4){animation-delay:.15s}

/* === SCROLLBAR === */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}
</style>
</head>

// === BUILD SIDEBAR ===
function buildSidebar(){
  const sidebar = document.getElementById('wikiSidebar');
  const sections = {};
  Object.entries(WIKI_PAGES).forEach(([key, page]) => {
    if(!sections[page.section]) sections[page.section] = [];
    sections[page.section].push({key, ...page});
  });
  let html = '';
  Object.entries(sections).forEach(([section, pages]) => {
    html += '<div class="nav-section">';
    html += '<div class="nav-section-title" onclick="toggleSection(this)"><span class="arrow">▼</span> ' + esc(section) + '</div>';
    pages.forEach(p => {
      html += '<div class="nav-item" data-page="' + esc(p.key) + '" onclick="loadPage(\'' + esc(p.key) + '\')">';
      html += '<span class="icon">' + esc(p.icon) + '</span> ' + esc(p.title);
      html += '</div>';
    });
    html += '</div>';
  });
  sidebar.innerHTML = html;
}

function toggleSection(el){
  el.classList.toggle('collapsed');
  const items = el.parentElement.querySelectorAll('.nav-item');
  items.forEach(i => i.style.display = el.classList.contains('collapsed') ? 'none' : 'flex');
}

function loadPage(key){
  const page = WIKI_PAGES[key];
  if(!page) return;
  document.getElementById('wikiContent').innerHTML = page.content();
  document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
  const active = document.querySelector('[data-page="' + key + '"]');
  if(active) active.classList.add('active');
  buildToc();
  document.querySelector('.wiki-main').scrollTop = 0;
  history.replaceState(null, '', '?page=' + key);
}

function buildToc(){
  const content = document.getElementById('wikiContent');
  const headings = content.querySelectorAll('h2, h3');
  const tocList = document.getElementById('tocList');
  let html = '';
  headings.forEach((h, i) => {
    h.id = 'heading-' + i;
    const cls = h.tagName === 'H3' ? 'toc-item toc-sub' : 'toc-item';
    html += '<div class="' + cls + '" onclick="document.getElementById(\'heading-' + i + '\').scrollIntoView({behavior:\'smooth\'})">' + esc(h.textContent) + '</div>';
  });
  tocList.innerHTML = html;
}

// === SEARCH ===
document.getElementById('wikiSearch').addEventListener('input', function(e){
  const q = e.target.value.toLowerCase();
  document.querySelectorAll('.nav-item').forEach(item => {
    const text = item.textContent.toLowerCase();
    item.style.display = !q || text.includes(q) ? 'flex' : 'none';
  });
});

document.addEventListener('keydown', function(e){
  if(e.ctrlKey && e.key === 'k'){e.preventDefault();document.getElementById('wikiSearch').focus()}
});

// === INIT ===
buildSidebar();
const urlPage = new URLSearchParams(window.location.search).get('page') || 'overview';
loadPage(urlPage);
