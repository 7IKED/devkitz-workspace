<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="dkz-version" content="v1.00.0_01">
<title>DkZ Designboard — Visual Design System</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#060608;--bg2:#0a0a0f;--surface:#0d0d14;--surface2:#12121c;
  --glass:rgba(255,255,255,0.03);--glass2:rgba(255,255,255,0.06);
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.12);
  --text:#e8e8f0;--text2:#8888a0;--text3:#555570;
  --accent:#fa1e4e;--green:#00ff88;--yellow:#ffb800;--red:#ff3b5c;
  --blue:#3b82f6;--purple:#a855f7;--cyan:#06b6d4;
  --font:'Inter',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh}

.db-header{
  background:linear-gradient(135deg,var(--bg2),var(--surface));
  border-bottom:1px solid var(--border);padding:16px 24px;
  display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;
  backdrop-filter:blur(20px);
}
.db-header .hub-btn{background:var(--glass2);border:1px solid var(--border2);border-radius:8px;color:var(--text);padding:8px 12px;text-decoration:none;font-size:13px;transition:all .2s}
.db-header .hub-btn:hover{background:var(--accent);border-color:var(--accent)}
.db-header h1{font-size:20px;font-weight:700;background:linear-gradient(135deg,var(--purple),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.db-header .tabs{margin-left:auto;display:flex;gap:4px}
.db-header .tab{
  background:var(--glass);border:1px solid var(--border);border-radius:6px;
  color:var(--text2);padding:6px 14px;font-size:12px;cursor:pointer;transition:all .2s;
}
.db-header .tab:hover{color:var(--text)}
.db-header .tab.active{background:var(--accent);border-color:var(--accent);color:#fff}

.db-main{padding:24px;max-width:1400px;margin:0 auto}
.section-title{font-size:18px;font-weight:700;margin:32px 0 16px;display:flex;align-items:center;gap:8px}
.section-title .badge{background:var(--glass2);border-radius:12px;padding:2px 10px;font-size:11px;color:var(--text3);font-family:var(--mono)}

/* COLOR SWATCHES */
.color-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin:16px 0}
.swatch{border-radius:12px;overflow:hidden;border:1px solid var(--border);transition:all .2s;cursor:pointer}
.swatch:hover{transform:translateY(-3px);box-shadow:0 8px 30px rgba(0,0,0,.4)}
.swatch-color{height:80px}
.swatch-info{padding:10px;background:var(--surface)}
.swatch-name{font-size:12px;font-weight:600}
.swatch-val{font-size:11px;color:var(--text3);font-family:var(--mono)}

/* TYPOGRAPHY */
.type-row{display:flex;align-items:baseline;gap:24px;padding:16px;border-bottom:1px solid var(--border)}
.type-label{width:120px;font-size:11px;color:var(--text3);font-family:var(--mono);flex-shrink:0}
.type-sample{flex:1}

/* COMPONENTS */
.comp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin:16px 0}
.comp-card{
  background:var(--glass);border:1px solid var(--border);border-radius:12px;
  padding:20px;transition:all .2s;
}
.comp-card:hover{border-color:var(--cyan)}
.comp-card h3{font-size:14px;font-weight:600;margin-bottom:12px;color:var(--cyan)}
.comp-preview{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:12px;min-height:80px;display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap}
.comp-code{font-family:var(--mono);font-size:11px;color:var(--text3);background:var(--surface);border-radius:6px;padding:8px;overflow-x:auto;white-space:pre}

/* BUTTONS */
.btn{padding:8px 20px;border-radius:8px;font-size:13px;font-family:var(--font);cursor:pointer;transition:all .2s;border:1px solid transparent}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{filter:brightness(1.2);transform:translateY(-1px)}
.btn-ghost{background:transparent;border-color:var(--green);color:var(--green)}
.btn-ghost:hover{background:rgba(0,255,136,0.1);box-shadow:0 0 20px rgba(0,255,136,0.15)}
.btn-outline{background:transparent;border-color:var(--border2);color:var(--text2)}
.btn-outline:hover{border-color:var(--text);color:var(--text)}
.btn-sm{padding:4px 12px;font-size:11px;border-radius:6px}
.btn-lg{padding:12px 32px;font-size:15px;border-radius:10px}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500}
.badge-green{background:rgba(0,255,136,0.1);color:var(--green);border:1px solid rgba(0,255,136,0.2)}
.badge-red{background:rgba(255,59,92,0.1);color:var(--red);border:1px solid rgba(255,59,92,0.2)}
.badge-yellow{background:rgba(255,184,0,0.1);color:var(--yellow);border:1px solid rgba(255,184,0,0.2)}

/* INPUTS */
.input{background:var(--glass);border:1px solid var(--border);border-radius:8px;padding:8px 14px;color:var(--text);font-family:var(--font);font-size:13px;outline:none;transition:border-color .2s;width:100%}
.input:focus{border-color:var(--green)}

/* GLASS CARD */
.glass-card{
  background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);
  border-radius:12px;backdrop-filter:blur(20px);padding:20px;
}
.glass-card:hover{border-color:rgba(255,255,255,0.12)}

/* PANELS */
.tab-panel{display:none}
.tab-panel.active{display:block}

/* ICON GRID */
.icon-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px;margin:16px 0}
.icon-item{
  background:var(--glass);border:1px solid var(--border);border-radius:8px;
  padding:12px;text-align:center;cursor:pointer;transition:all .2s;
}
.icon-item:hover{border-color:var(--cyan);transform:scale(1.05)}
.icon-item .emoji{font-size:24px;margin-bottom:4px}
.icon-item .label{font-size:9px;color:var(--text3)}

/* GRADIENT BAR */
.gradient-bar{height:40px;border-radius:8px;margin:8px 0}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .3s ease forwards;opacity:0}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>
</head>
<body>

<header class="db-header">
  <a href="../../hub/index.html" class="hub-btn">◀ Hub</a>
  <h1>🎨 DkZ Designboard</h1>
  <div class="tabs">
    <div class="tab active" onclick="showTab('colors')">Colors</div>
    <div class="tab" onclick="showTab('typography')">Typography</div>
    <div class="tab" onclick="showTab('components')">Components</div>
    <div class="tab" onclick="showTab('icons')">Icons</div>
    <div class="tab" onclick="showTab('gradients')">Gradients</div>
    <div class="tab" onclick="showTab('layouts')">Layouts</div>
  </div>
</header>

<main class="db-main">

<!-- COLORS TAB -->
<div class="tab-panel active" id="tab-colors">
  <div class="section-title">🎨 Core Palette <span class="badge">6 Colors</span></div>
  <div class="color-grid" id="colorGrid"></div>

  <div class="section-title">🌈 Extended Palette <span class="badge">8 Colors</span></div>
  <div class="color-grid" id="extColorGrid"></div>

  <div class="section-title">🪟 Glass & Surface <span class="badge">4 Levels</span></div>
  <div class="color-grid" id="surfaceGrid"></div>
</div>

<!-- TYPOGRAPHY TAB -->
<div class="tab-panel" id="tab-typography">
  <div class="section-title">📝 Typography Scale</div>
  <div id="typeScale"></div>
</div>

<!-- COMPONENTS TAB -->
<div class="tab-panel" id="tab-components">
  <div class="section-title">🧩 UI Components <span class="badge">8 Types</span></div>
  <div class="comp-grid" id="compGrid"></div>
</div>

<!-- ICONS TAB -->
<div class="tab-panel" id="tab-icons">
  <div class="section-title">✨ Module Icons <span class="badge">24 Icons</span></div>
  <div class="icon-grid" id="iconGrid"></div>
</div>

<!-- GRADIENTS TAB -->
<div class="tab-panel" id="tab-gradients">
  <div class="section-title">🌈 Gradient Library <span class="badge">8 Gradients</span></div>
  <div id="gradientList"></div>
</div>

<!-- LAYOUTS TAB -->
<div class="tab-panel" id="tab-layouts">
  <div class="section-title">📐 Layout Patterns</div>
  <div class="comp-grid" id="layoutGrid"></div>
</div>

</main>

<script>
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

// === TABS ===
function showTab(name){
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  document.querySelector('.tab[onclick*="'+name+'"]').classList.add('active');
}

// === COLORS ===
const CORE_COLORS = [
  {name:'Background',token:'--bg',val:'#060608'},
  {name:'Accent',token:'--accent',val:'#fa1e4e'},
  {name:'Green',token:'--green',val:'#00ff88'},
  {name:'Yellow',token:'--yellow',val:'#ffb800'},
  {name:'Red',token:'--red',val:'#ff3b5c'},
  {name:'Text',token:'--text',val:'#e8e8f0'}
];
const EXT_COLORS = [
  {name:'Blue',token:'--blue',val:'#3b82f6'},
  {name:'Purple',token:'--purple',val:'#a855f7'},
  {name:'Cyan',token:'--cyan',val:'#06b6d4'},
  {name:'Surface',token:'--surface',val:'#0d0d14'},
  {name:'Surface 2',token:'--surface2',val:'#12121c'},
  {name:'Text 2',token:'--text2',val:'#8888a0'},
  {name:'Text 3',token:'--text3',val:'#555570'},
  {name:'Border',token:'--border2',val:'rgba(255,255,255,0.12)'}
];
const SURFACES = [
  {name:'Glass L1',token:'--glass',val:'rgba(255,255,255,0.03)',bg:'rgba(255,255,255,0.03)'},
  {name:'Glass L2',token:'--glass2',val:'rgba(255,255,255,0.06)',bg:'rgba(255,255,255,0.06)'},
  {name:'Border L1',token:'--border',val:'rgba(255,255,255,0.06)',bg:'rgba(255,255,255,0.06)'},
  {name:'Border L2',token:'--border2',val:'rgba(255,255,255,0.12)',bg:'rgba(255,255,255,0.12)'}
];

function renderColors(colors, containerId){
  const grid = document.getElementById(containerId);
  grid.innerHTML = colors.map(c => {
    const bg = c.bg || c.val;
    return '<div class="swatch fade-up" onclick="navigator.clipboard.writeText(\''+esc(c.val)+'\')">' +
      '<div class="swatch-color" style="background:'+bg+'"></div>' +
      '<div class="swatch-info"><div class="swatch-name">'+esc(c.name)+'</div>' +
      '<div class="swatch-val">'+esc(c.token)+': '+esc(c.val)+'</div></div></div>';
  }).join('');
}
renderColors(CORE_COLORS, 'colorGrid');
renderColors(EXT_COLORS, 'extColorGrid');
renderColors(SURFACES, 'surfaceGrid');

// === TYPOGRAPHY ===
const TYPE_SCALE = [
  {name:'Display',size:'32px',weight:'900',family:'Inter',sample:'DEVKiTZ Ecosystem'},
  {name:'H1',size:'24px',weight:'700',family:'Inter',sample:'Module Dashboard'},
  {name:'H2',size:'20px',weight:'600',family:'Inter',sample:'Feature Section'},
  {name:'H3',size:'16px',weight:'600',family:'Inter',sample:'Component Title'},
  {name:'Body',size:'14px',weight:'400',family:'Inter',sample:'Regular paragraph text for content areas.'},
  {name:'Small',size:'12px',weight:'400',family:'Inter',sample:'Metadata, timestamps, secondary info'},
  {name:'Caption',size:'11px',weight:'500',family:'Inter',sample:'UPPERCASE LABELS AND BADGES'},
  {name:'Code',size:'13px',weight:'400',family:'JetBrains Mono',sample:'const x = await fetch("/api/data")'},
  {name:'Mono SM',size:'11px',weight:'400',family:'JetBrains Mono',sample:'v1.00.0_01 · 2026-05-29'}
];
document.getElementById('typeScale').innerHTML = TYPE_SCALE.map(t =>
  '<div class="type-row"><div class="type-label">'+esc(t.name)+'<br>'+esc(t.size)+' / '+esc(t.weight)+'</div>' +
  '<div class="type-sample" style="font-size:'+t.size+';font-weight:'+t.weight+';font-family:\''+t.family+'\',sans-serif">'+esc(t.sample)+'</div></div>'
).join('');

// === COMPONENTS ===
const COMPONENTS = [
  {name:'Buttons',preview:'<button class="btn btn-primary">Primary</button><button class="btn btn-ghost">Ghost</button><button class="btn btn-outline">Outline</button>',code:'.btn-primary { background: var(--accent); }'},
  {name:'Badges',preview:'<span class="badge badge-green">🟢 Live</span><span class="badge badge-yellow">🟡 Standby</span><span class="badge badge-red">🔴 Offline</span>',code:'.badge-green { color: var(--green); }'},
  {name:'Input',preview:'<input class="input" placeholder="Search modules..." style="max-width:240px">',code:'.input:focus { border-color: var(--green); }'},
  {name:'Glass Card',preview:'<div class="glass-card" style="max-width:200px"><strong>Module</strong><br><span style="color:var(--text3);font-size:12px">143 active modules</span></div>',code:'backdrop-filter: blur(20px);'},
  {name:'Button Sizes',preview:'<button class="btn btn-primary btn-sm">Small</button><button class="btn btn-primary">Default</button><button class="btn btn-primary btn-lg">Large</button>',code:'.btn-sm / .btn / .btn-lg'},
  {name:'Status Dot',preview:'<span style="display:inline-flex;align-items:center;gap:6px"><span style="width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green)"></span> Online</span>',code:'box-shadow: 0 0 8px var(--green);'},
  {name:'Code Block',preview:'<div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;font-family:var(--mono);font-size:12px;color:var(--green)">npm run dev</div>',code:'font-family: var(--mono);'},
  {name:'Progress Bar',preview:'<div style="background:var(--glass);border-radius:6px;height:8px;width:200px;overflow:hidden"><div style="width:72%;height:100%;background:linear-gradient(90deg,var(--green),var(--cyan));border-radius:6px"></div></div><span style="font-size:11px;color:var(--text3);margin-left:8px">72%</span>',code:'background: linear-gradient(90deg, var(--green), var(--cyan));'}
];
document.getElementById('compGrid').innerHTML = COMPONENTS.map(c =>
  '<div class="comp-card fade-up"><h3>'+esc(c.name)+'</h3><div class="comp-preview">'+c.preview+'</div><div class="comp-code">'+esc(c.code)+'</div></div>'
).join('');

// === ICONS ===
const ICONS = [
  {e:'🏠',l:'Hub'},{e:'📈',l:'Graphify'},{e:'🔒',l:'DeepKeep'},{e:'🤖',l:'Copilot'},
  {e:'⚡',l:'n8n'},{e:'🧬',l:'OpenHumans'},{e:'🔗',l:'GitNexus'},{e:'🐟',l:'MiroFish'},
  {e:'🔔',l:'Webhooks'},{e:'📊',l:'Analytics'},{e:'🎯',l:'James'},{e:'📋',l:'Kanban'},
  {e:'🔍',l:'Search'},{e:'📖',l:'Wiki'},{e:'🎨',l:'Design'},{e:'⚙️',l:'Settings'},
  {e:'📡',l:'API'},{e:'🗂️',l:'Files'},{e:'💬',l:'Chat'},{e:'📸',l:'Screenshot'},
  {e:'🌐',l:'Network'},{e:'🧪',l:'Tests'},{e:'📦',l:'Packages'},{e:'🔐',l:'Security'}
];
document.getElementById('iconGrid').innerHTML = ICONS.map(i =>
  '<div class="icon-item"><div class="emoji">'+esc(i.e)+'</div><div class="label">'+esc(i.l)+'</div></div>'
).join('');

// === GRADIENTS ===
const GRADIENTS = [
  {name:'Accent Fire',css:'linear-gradient(135deg, #fa1e4e, #ffb800)'},
  {name:'Neon Matrix',css:'linear-gradient(135deg, #00ff88, #06b6d4)'},
  {name:'Purple Haze',css:'linear-gradient(135deg, #a855f7, #3b82f6)'},
  {name:'Sunset',css:'linear-gradient(135deg, #fa1e4e, #a855f7)'},
  {name:'Ocean Deep',css:'linear-gradient(135deg, #06b6d4, #3b82f6)'},
  {name:'Gold Rush',css:'linear-gradient(135deg, #ffb800, #fa1e4e)'},
  {name:'Midnight',css:'linear-gradient(135deg, #0d0d14, #12121c)'},
  {name:'Aurora',css:'linear-gradient(135deg, #00ff88, #a855f7, #fa1e4e)'}
];
document.getElementById('gradientList').innerHTML = GRADIENTS.map(g =>
  '<div style="margin:8px 0"><div style="font-size:12px;font-weight:600;margin-bottom:4px">'+esc(g.name)+'</div>' +
  '<div class="gradient-bar" style="background:'+g.css+'"></div>' +
  '<div style="font-size:10px;color:var(--text3);font-family:var(--mono)">'+esc(g.css)+'</div></div>'
).join('');

// === LAYOUTS ===
document.getElementById('layoutGrid').innerHTML = [
  {name:'Sidebar + Main',desc:'280px sidebar, fluid main',code:'display:flex; .sidebar{width:280px} .main{flex:1}'},
  {name:'Stats Grid',desc:'4-column responsive grid',code:'display:grid; grid-template-columns:repeat(4,1fr); gap:12px'},
  {name:'Module Grid',desc:'Auto-fill card layout',code:'grid-template-columns:repeat(auto-fill,minmax(200px,1fr))'},
  {name:'Header Sticky',desc:'Glassmorphism sticky header',code:'position:sticky;top:0;backdrop-filter:blur(20px)'}
].map(l =>
  '<div class="comp-card fade-up"><h3>'+esc(l.name)+'</h3><p style="font-size:12px;color:var(--text2);margin-bottom:8px">'+esc(l.desc)+'</p><div class="comp-code">'+esc(l.code)+'</div></div>'
).join('');
</script>

<script src="../../shared/dkz-debug.js" defer></script>
<script src="../../shared/dkz-guide.js" defer></script>
<script src="../../shared/dkz-copilot.js" defer></script>
<script src="../../shared/dkz-james.js" defer></script>
<script src="../../shared/dkz-navbar.js" defer></script>
<script src="../../shared/dkz-console.js" defer></script>
<script src="../../shared/dkz-premium.js" defer></script>
</body>
</html>
