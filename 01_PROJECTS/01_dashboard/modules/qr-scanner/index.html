<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="dkz-version" content="v1.00.0_01">
    <meta name="description" content="DEVKiTZ QR Scanner - Scan and Generate QR Codes">
    <title>QR Scanner | DEVKiTZ</title>
    <link rel="manifest" href="../../shared/manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <style>
        /* === DkZ Design System — Neon Matrix QR === */
        :root {
            --bg: #000000;
            --bg-card: rgba(10, 10, 15, 0.85);
            --bg-card-hover: rgba(15, 15, 25, 0.95);
            --bg-input: rgba(8, 8, 12, 0.9);
            --green: #00ff88;
            --green-dim: rgba(0, 255, 136, 0.12);
            --green-glow: 0 0 20px rgba(0, 255, 136, 0.25);
            --accent: #fa1e4e;
            --accent-dim: rgba(250, 30, 78, 0.12);
            --accent-glow: 0 0 20px rgba(250, 30, 78, 0.25);
            --yellow: #ffb800;
            --yellow-dim: rgba(255, 184, 0, 0.12);
            --red: #ff3b5c;
            --text: #e0e0e0;
            --text-dim: #666;
            --border: rgba(255, 255, 255, 0.06);
            --border-hover: rgba(255, 255, 255, 0.12);
            --radius: 16px;
            --radius-sm: 10px;
            --font-ui: 'Inter', system-ui, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="high-contrast"] {
            --bg: #000000;
            --bg-card: rgba(0, 20, 10, 0.9);
            --bg-card-hover: rgba(0, 30, 15, 0.95);
            --text: #ffffff;
            --text-dim: #00ff88;
            --border: rgba(0, 255, 136, 0.2);
            --border-hover: rgba(0, 255, 136, 0.4);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-ui);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.6;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 25% 40%, rgba(0, 255, 136, 0.03) 0%, transparent 60%),
                radial-gradient(ellipse at 75% 70%, rgba(250, 30, 78, 0.02) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* === Top Bar === */
        .topbar {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 24px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        .topbar-left { display: flex; align-items: center; gap: 14px; }

        .hub-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background: var(--accent-dim);
            color: var(--accent);
            border: 1px solid rgba(250, 30, 78, 0.2);
            border-radius: var(--radius-sm);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            transition: var(--transition);
        }

        .hub-btn:hover { background: rgba(250, 30, 78, 0.2); box-shadow: var(--accent-glow); }

        .topbar h1 {
            font-size: 18px;
            font-weight: 600;
            background: linear-gradient(135deg, var(--green), var(--text));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .topbar-right { display: flex; align-items: center; gap: 8px; }

        .toggle-btn {
            padding: 6px 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-dim);
            font-size: 12px;
            font-family: var(--font-mono);
            cursor: pointer;
            transition: var(--transition);
        }

        .toggle-btn:hover, .toggle-btn.active {
            color: var(--green);
            border-color: rgba(0, 255, 136, 0.3);
            background: var(--green-dim);
        }

        /* === Container === */
        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 24px 20px 40px;
            position: relative;
            z-index: 1;
        }

        /* === Tab Navigation === */
        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 4px;
            animation: fadeInUp 0.4s ease forwards;
            opacity: 0;
        }

        .tab-btn {
            flex: 1;
            padding: 10px 20px;
            background: transparent;
            border: none;
            border-radius: var(--radius-sm);
            color: var(--text-dim);
            font-family: var(--font-ui);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
        }

        .tab-btn:hover { color: var(--text); }

        .tab-btn.active {
            background: var(--green-dim);
            color: var(--green);
            box-shadow: var(--green-glow);
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* === Scanner Section === */
        .scanner-area {
            animation: fadeInUp 0.4s 0.1s ease forwards;
            opacity: 0;
        }

        .viewfinder-wrap {
            position: relative;
            max-width: 480px;
            margin: 0 auto 20px;
            border-radius: var(--radius);
            overflow: hidden;
            background: var(--bg-card);
            border: 2px solid var(--green);
            box-shadow: var(--green-glow);
            aspect-ratio: 4/3;
        }

        #scanVideo, #scanCanvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        #scanCanvas { display: none; }

        /* Scanning line animation */
        .scan-line {
            position: absolute;
            left: 10%;
            right: 10%;
            height: 2px;
            background: var(--green);
            box-shadow: 0 0 12px var(--green), 0 0 30px rgba(0, 255, 136, 0.3);
            z-index: 5;
            animation: scanMove 2.5s ease-in-out infinite;
            display: none;
        }

        .scan-line.active { display: block; }

        @keyframes scanMove {
            0%, 100% { top: 15%; }
            50% { top: 85%; }
        }

        /* Corner markers */
        .viewfinder-corners {
            position: absolute;
            inset: 12%;
            z-index: 4;
            pointer-events: none;
        }

        .viewfinder-corners::before,
        .viewfinder-corners::after,
        .corner-bl, .corner-br {
            position: absolute;
            width: 24px;
            height: 24px;
            border-color: var(--green);
            border-style: solid;
            content: '';
        }

        .viewfinder-corners::before { top: 0; left: 0; border-width: 3px 0 0 3px; }
        .viewfinder-corners::after { top: 0; right: 0; border-width: 3px 3px 0 0; }
        .corner-bl { bottom: 0; left: 0; border-width: 0 0 3px 3px; }
        .corner-br { bottom: 0; right: 0; border-width: 0 3px 3px 0; }

        .camera-controls {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .cam-btn {
            padding: 10px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            backdrop-filter: blur(8px);
        }

        .cam-btn:hover { border-color: var(--green); color: var(--green); background: var(--green-dim); }
        .cam-btn.active { border-color: var(--green); color: var(--green); background: var(--green-dim); }
        .cam-btn.stop { color: var(--red); }
        .cam-btn.stop:hover { border-color: var(--red); background: rgba(255, 59, 92, 0.1); }

        /* === Result Display === */
        .result-box {
            display: none;
            padding: 16px;
            background: var(--bg-card);
            border: 1px solid var(--green);
            border-radius: var(--radius);
            margin-bottom: 20px;
            backdrop-filter: blur(12px);
            animation: scaleIn 0.3s ease;
        }

        .result-box.show { display: block; }

        .result-label {
            font-size: 11px;
            color: var(--text-dim);
            font-family: var(--font-mono);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .result-text {
            font-family: var(--font-mono);
            font-size: 14px;
            color: var(--green);
            word-break: break-all;
            margin-bottom: 12px;
            line-height: 1.5;
        }

        .result-actions { display: flex; gap: 8px; flex-wrap: wrap; }

        .res-btn {
            padding: 8px 16px;
            background: var(--green-dim);
            border: 1px solid rgba(0, 255, 136, 0.2);
            border-radius: var(--radius-sm);
            color: var(--green);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
        }

        .res-btn:hover { background: rgba(0, 255, 136, 0.2); box-shadow: var(--green-glow); }
        .res-btn.accent { background: var(--accent-dim); color: var(--accent); border-color: rgba(250, 30, 78, 0.2); }
        .res-btn.accent:hover { background: rgba(250, 30, 78, 0.2); box-shadow: var(--accent-glow); }

        /* === Drop Zone === */
        .drop-zone {
            padding: 40px 20px;
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            text-align: center;
            color: var(--text-dim);
            font-size: 14px;
            cursor: pointer;
            transition: var(--transition);
            margin-bottom: 20px;
            animation: fadeInUp 0.4s 0.2s ease forwards;
            opacity: 0;
        }

        .drop-zone:hover, .drop-zone.dragover {
            border-color: var(--green);
            color: var(--green);
            background: var(--green-dim);
            box-shadow: var(--green-glow);
        }

        .drop-zone .icon { font-size: 32px; margin-bottom: 8px; }

        .drop-zone input[type="file"] { display: none; }

        /* === Generator Section === */
        .gen-section {
            animation: fadeInUp 0.4s 0.1s ease forwards;
            opacity: 0;
        }

        .gen-input-wrap {
            margin-bottom: 16px;
        }

        .gen-input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-family: var(--font-ui);
            font-size: 14px;
            outline: none;
            transition: var(--transition);
        }

        .gen-input:focus { border-color: var(--green); box-shadow: var(--green-glow); }

        .gen-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .gen-btn {
            padding: 10px 24px;
            background: var(--green-dim);
            border: 1px solid rgba(0, 255, 136, 0.2);
            border-radius: var(--radius-sm);
            color: var(--green);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .gen-btn:hover { background: rgba(0, 255, 136, 0.2); box-shadow: var(--green-glow); }

        .gen-btn.download {
            background: var(--accent-dim);
            color: var(--accent);
            border-color: rgba(250, 30, 78, 0.2);
        }

        .gen-btn.download:hover { background: rgba(250, 30, 78, 0.2); box-shadow: var(--accent-glow); }

        .qr-preview {
            display: flex;
            justify-content: center;
            padding: 24px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 20px;
            min-height: 200px;
            align-items: center;
            backdrop-filter: blur(12px);
        }

        .qr-preview canvas, .qr-preview img {
            max-width: 250px;
            border-radius: 8px;
        }

        .qr-placeholder {
            color: var(--text-dim);
            font-size: 14px;
            text-align: center;
        }

        /* === History Section === */
        .history-section {
            animation: fadeInUp 0.4s 0.3s ease forwards;
            opacity: 0;
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title .count {
            background: var(--green-dim);
            color: var(--green);
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-family: var(--font-mono);
        }

        .history-list { display: grid; gap: 8px; }

        .history-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 14px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            backdrop-filter: blur(8px);
            transition: var(--transition);
        }

        .history-item:hover { border-color: var(--border-hover); background: var(--bg-card-hover); }

        .history-text {
            flex: 1;
            font-size: 13px;
            font-family: var(--font-mono);
            color: var(--text);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .badge {
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-url { background: var(--accent-dim); color: var(--accent); }
        .badge-text { background: var(--green-dim); color: var(--green); }

        .history-time {
            font-size: 11px;
            color: var(--text-dim);
            font-family: var(--font-mono);
            white-space: nowrap;
        }

        .small-btn {
            padding: 4px 10px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-dim);
            font-size: 12px;
            cursor: pointer;
            transition: var(--transition);
        }

        .small-btn:hover { color: var(--green); border-color: rgba(0, 255, 136, 0.3); }

        /* === Error Message === */
        .error-msg {
            padding: 14px 20px;
            background: rgba(255, 59, 92, 0.08);
            border: 1px solid rgba(255, 59, 92, 0.2);
            border-radius: var(--radius-sm);
            color: var(--red);
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }

        .error-msg.show { display: block; }

        /* === Toast === */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            padding: 10px 20px;
            background: var(--green-dim);
            border: 1px solid rgba(0, 255, 136, 0.3);
            border-radius: var(--radius-sm);
            color: var(--green);
            font-size: 13px;
            font-weight: 500;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
            z-index: 300;
        }

        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* === Animations === */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        /* === Responsive === */
        @media (max-width: 600px) {
            .topbar { padding: 10px 14px; }
            .topbar h1 { font-size: 15px; }
            .container { padding: 16px 12px 30px; }
            .viewfinder-wrap { max-width: 100%; }
            .camera-controls { flex-wrap: wrap; }
            .gen-controls { flex-direction: column; }
        }
    </style>
</head>
<body>
    <!-- Top Bar -->
    <header class="topbar">
        <div class="topbar-left">
            <a href="../../hub/index.html" class="hub-btn">&#9668; Hub</a>
            <h1>&#128247; QR Scanner</h1>
        </div>
        <div class="topbar-right">
            <button class="toggle-btn" id="contrastToggle" title="Toggle High Contrast">&#9681; HC</button>
            <button class="toggle-btn" id="langToggle" title="Toggle Language">EN</button>
        </div>
    </header>

    <main class="container">
        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="scan" id="tabScan">&#128247; Scan</button>
            <button class="tab-btn" data-tab="generate" id="tabGen">&#9998; Generate</button>
        </div>

        <!-- === SCAN TAB === -->
        <div class="tab-content active" id="scanTab">
            <div class="scanner-area">
                <!-- Error Message -->
                <div class="error-msg" id="cameraError"></div>

                <!-- Viewfinder -->
                <div class="viewfinder-wrap" id="viewfinderWrap">
                    <video id="scanVideo" autoplay playsinline muted></video>
                    <canvas id="scanCanvas"></canvas>
                    <div class="scan-line" id="scanLine"></div>
                    <div class="viewfinder-corners">
                        <div class="corner-bl"></div>
                        <div class="corner-br"></div>
                    </div>
                </div>

                <!-- Camera Controls -->
                <div class="camera-controls">
                    <button class="cam-btn" id="startCamBtn">&#128247; Start Camera</button>
                    <button class="cam-btn stop" id="stopCamBtn" style="display:none">&#9632; Stop</button>
                    <button class="cam-btn" id="torchBtn" style="display:none">&#128294; Flash</button>
                </div>

                <!-- Result -->
                <div class="result-box" id="resultBox">
                    <div class="result-label" id="resultLabel">SCANNED RESULT</div>
                    <div class="result-text" id="resultText"></div>
                    <div class="result-actions" id="resultActions"></div>
                </div>

                <!-- Drop Zone -->
                <div class="drop-zone" id="dropZone">
                    <div class="icon">&#128193;</div>
                    <div id="dropLabel">Drop an image here or click to upload</div>
                    <input type="file" id="fileInput" accept="image/*">
                </div>
            </div>
        </div>

        <!-- === GENERATE TAB === -->
        <div class="tab-content" id="genTab">
            <div class="gen-section">
                <div class="gen-input-wrap">
                    <input type="text" class="gen-input" id="genInput" placeholder="Enter text or URL to encode...">
                </div>
                <div class="gen-controls">
                    <button class="gen-btn" id="generateBtn">&#9998; Generate QR</button>
                    <button class="gen-btn download" id="downloadBtn" style="display:none">&#128229; Download PNG</button>
                </div>
                <div class="qr-preview" id="qrPreview">
                    <div class="qr-placeholder" id="qrPlaceholder">Enter text above and click Generate</div>
                </div>
            </div>
        </div>

        <!-- History -->
        <div class="history-section">
            <div class="section-title" id="historyTitle">
                &#128336; Scan History <span class="count" id="historyCount">0</span>
            </div>
            <div class="history-list" id="historyList"></div>
        </div>
    </main>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
    /* === DEVKiTZ QR Scanner === */
    'use strict';

    /* --- XSS Protection --- */
    function esc(s) {
        const d = document.createElement('div');
        d.textContent = String(s);
        return d.innerHTML;
    }

    /* --- i18n --- */
    const i18n = {
        en: {
            title: '\u{1F4F7} QR Scanner', scan: '\u{1F4F7} Scan', generate: '\u270E Generate',
            startCam: '\u{1F4F7} Start Camera', stop: '\u25A0 Stop', flash: '\u{1F526} Flash',
            result: 'SCANNED RESULT', copy: '\u{1F4CB} Copy', open: '\u{1F310} Open URL',
            dropLabel: 'Drop an image here or click to upload',
            genPlaceholder: 'Enter text or URL to encode...',
            genBtn: '\u270E Generate QR', downloadBtn: '\u{1F4E5} Download PNG',
            qrPlaceholder: 'Enter text above and click Generate',
            historyTitle: '\u{1F550} Scan History',
            copied: 'Copied to clipboard!',
            cameraError: 'Camera access denied. Please allow camera permissions.',
            noQR: 'No QR code found in image.'
        },
        de: {
            title: '\u{1F4F7} QR Scanner', scan: '\u{1F4F7} Scannen', generate: '\u270E Generieren',
            startCam: '\u{1F4F7} Kamera starten', stop: '\u25A0 Stopp', flash: '\u{1F526} Blitz',
            result: 'SCAN-ERGEBNIS', copy: '\u{1F4CB} Kopieren', open: '\u{1F310} URL oeffnen',
            dropLabel: 'Bild hierher ziehen oder klicken zum Hochladen',
            genPlaceholder: 'Text oder URL zum Codieren eingeben...',
            genBtn: '\u270E QR Generieren', downloadBtn: '\u{1F4E5} PNG Herunterladen',
            qrPlaceholder: 'Text oben eingeben und Generieren klicken',
            historyTitle: '\u{1F550} Scan-Verlauf',
            copied: 'In Zwischenablage kopiert!',
            cameraError: 'Kamerazugriff verweigert. Bitte Berechtigung erteilen.',
            noQR: 'Kein QR-Code im Bild gefunden.'
        }
    };

    let currentLang = 'en';
    function t(key) { return i18n[currentLang][key] || key; }

    function applyLang() {
        document.querySelector('.topbar h1').innerHTML = esc(t('title'));
        document.getElementById('tabScan').innerHTML = esc(t('scan'));
        document.getElementById('tabGen').innerHTML = esc(t('generate'));
        document.getElementById('startCamBtn').innerHTML = esc(t('startCam'));
        document.getElementById('stopCamBtn').innerHTML = esc(t('stop'));
        document.getElementById('torchBtn').innerHTML = esc(t('flash'));
        document.getElementById('resultLabel').textContent = t('result');
        document.getElementById('dropLabel').textContent = t('dropLabel');
        document.getElementById('genInput').placeholder = t('genPlaceholder');
        document.getElementById('generateBtn').innerHTML = esc(t('genBtn'));
        document.getElementById('downloadBtn').innerHTML = esc(t('downloadBtn'));
        document.getElementById('qrPlaceholder').textContent = t('qrPlaceholder');
        document.getElementById('langToggle').textContent = currentLang.toUpperCase();
        renderHistory();
    }

    /* --- State --- */
    const HISTORY_KEY = 'dkz-qr-history';
    let scanHistory = [];
    let videoStream = null;
    let scanning = false;
    let animFrameId = null;
    let torchOn = false;

    function loadHistory() {
        try {
            const raw = localStorage.getItem(HISTORY_KEY);
            scanHistory = raw ? JSON.parse(raw) : [];
        } catch (_e) { scanHistory = []; }
    }

    function saveHistory() {
        localStorage.setItem(HISTORY_KEY, JSON.stringify(scanHistory));
    }

    function addToHistory(result) {
        if (!result || !result.trim()) return;
        const existing = scanHistory.findIndex(function(h) { return h.result === result; });
        if (existing !== -1) {
            scanHistory[existing].timestamp = Date.now();
        } else {
            scanHistory.unshift({
                id: 'qr_' + Date.now(),
                result: result,
                type: isURL(result) ? 'url' : 'text',
                timestamp: Date.now()
            });
            if (scanHistory.length > 50) scanHistory.pop();
        }
        saveHistory();
        renderHistory();
    }

    function isURL(str) {
        return /^https?:\/\//i.test(str.trim()) || /^www\./i.test(str.trim());
    }

    /* --- Camera --- */
    function startCamera() {
        const video = document.getElementById('scanVideo');
        const errorEl = document.getElementById('cameraError');
        errorEl.classList.remove('show');

        navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 480 } }
        }).then(function(stream) {
            videoStream = stream;
            video.srcObject = stream;
            video.play();
            scanning = true;
            document.getElementById('startCamBtn').style.display = 'none';
            document.getElementById('stopCamBtn').style.display = '';
            document.getElementById('scanLine').classList.add('active');

            /* Check torch support */
            const track = stream.getVideoTracks()[0];
            if (track && track.getCapabilities && track.getCapabilities().torch) {
                document.getElementById('torchBtn').style.display = '';
            }

            scanLoop();
        }).catch(function() {
            errorEl.textContent = t('cameraError');
            errorEl.classList.add('show');
        });
    }

    function stopCamera() {
        scanning = false;
        if (animFrameId) cancelAnimationFrame(animFrameId);
        if (videoStream) {
            videoStream.getTracks().forEach(function(tr) { tr.stop(); });
            videoStream = null;
        }
        document.getElementById('scanVideo').srcObject = null;
        document.getElementById('startCamBtn').style.display = '';
        document.getElementById('stopCamBtn').style.display = 'none';
        document.getElementById('torchBtn').style.display = 'none';
        document.getElementById('scanLine').classList.remove('active');
        torchOn = false;
    }

    function toggleTorch() {
        if (!videoStream) return;
        const track = videoStream.getVideoTracks()[0];
        if (!track) return;
        torchOn = !torchOn;
        track.applyConstraints({ advanced: [{ torch: torchOn }] }).catch(function() {
            torchOn = false;
        });
        document.getElementById('torchBtn').classList.toggle('active', torchOn);
    }

    function scanLoop() {
        if (!scanning) return;
        const video = document.getElementById('scanVideo');
        const canvas = document.getElementById('scanCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });

        if (video.readyState === video.HAVE_ENOUGH_DATA) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);

            if (typeof jsQR === 'function') {
                const code = jsQR(imageData.data, imageData.width, imageData.height, {
                    inversionAttempts: 'dontInvert'
                });
                if (code && code.data) {
                    showResult(code.data);
                    addToHistory(code.data);
                    /* Brief pause before resuming scan */
                    setTimeout(function() {
                        animFrameId = requestAnimationFrame(scanLoop);
                    }, 2000);
                    return;
                }
            }
        }
        animFrameId = requestAnimationFrame(scanLoop);
    }

    /* --- Image Upload Scanning --- */
    function scanImage(file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                canvas.width = img.width;
                canvas.height = img.height;
                const ctx = canvas.getContext('2d', { willReadFrequently: true });
                ctx.drawImage(img, 0, 0);
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);

                if (typeof jsQR === 'function') {
                    const code = jsQR(imageData.data, imageData.width, imageData.height);
                    if (code && code.data) {
                        showResult(code.data);
                        addToHistory(code.data);
                    } else {
                        showToast(t('noQR'));
                    }
                }
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    /* --- Show Result --- */
    function showResult(data) {
        const box = document.getElementById('resultBox');
        const textEl = document.getElementById('resultText');
        const actionsEl = document.getElementById('resultActions');

        textEl.textContent = data;
        box.classList.add('show');

        let html = '<button class="res-btn" onclick="copyResult()">' + esc(t('copy')) + '</button>';
        if (isURL(data)) {
            html += '<a class="res-btn accent" href="' + esc(data) + '" target="_blank" rel="noopener">' + esc(t('open')) + '</a>';
        }
        actionsEl.innerHTML = html;
    }

    function copyResult() {
        const text = document.getElementById('resultText').textContent;
        if (navigator.clipboard) {
            navigator.clipboard.writeText(text).then(function() {
                showToast(t('copied'));
            });
        }
    }

    /* --- QR Generator --- */
    function generateQR() {
        const text = document.getElementById('genInput').value.trim();
        if (!text) return;

        const preview = document.getElementById('qrPreview');
        const placeholder = document.getElementById('qrPlaceholder');

        try {
            /* Using qrcode-generator library */
            const qr = qrcode(0, 'M');
            qr.addData(text);
            qr.make();

            const moduleCount = qr.getModuleCount();
            const cellSize = Math.max(4, Math.floor(250 / moduleCount));
            const size = moduleCount * cellSize;

            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            canvas.id = 'qrCanvas';
            const ctx = canvas.getContext('2d');

            /* Black background with green QR */
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, size, size);

            for (let row = 0; row < moduleCount; row++) {
                for (let col = 0; col < moduleCount; col++) {
                    if (qr.isDark(row, col)) {
                        ctx.fillStyle = '#00ff88';
                        ctx.fillRect(col * cellSize, row * cellSize, cellSize, cellSize);
                    }
                }
            }

            preview.innerHTML = '';
            preview.appendChild(canvas);
            if (placeholder) placeholder.style.display = 'none';
            document.getElementById('downloadBtn').style.display = '';
        } catch (err) {
            preview.innerHTML = '<div class="qr-placeholder">Error generating QR code</div>';
        }
    }

    function downloadQR() {
        const canvas = document.getElementById('qrCanvas');
        if (!canvas) return;
        const a = document.createElement('a');
        a.download = 'qr-code-' + Date.now() + '.png';
        a.href = canvas.toDataURL('image/png');
        a.click();
    }

    /* --- History --- */
    function renderHistory() {
        const list = document.getElementById('historyList');
        const countEl = document.getElementById('historyCount');
        countEl.textContent = scanHistory.length;

        if (scanHistory.length === 0) { list.innerHTML = ''; return; }

        let html = '';
        scanHistory.forEach(function(item) {
            const preview = item.result.length > 60 ? item.result.slice(0, 60) + '...' : item.result;
            const badgeClass = item.type === 'url' ? 'badge-url' : 'badge-text';
            const timeStr = new Date(item.timestamp).toLocaleString();
            html += '<div class="history-item">';
            html += '  <span class="badge ' + esc(badgeClass) + '">' + esc(item.type) + '</span>';
            html += '  <span class="history-text">' + esc(preview) + '</span>';
            html += '  <span class="history-time">' + esc(timeStr) + '</span>';
            html += '  <button class="small-btn" onclick="copyHistoryItem(\'' + esc(item.id) + '\')">\u{1F4CB}</button>';
            if (item.type === 'url') {
                html += '  <a class="small-btn" href="' + esc(item.result) + '" target="_blank" rel="noopener">\u{1F310}</a>';
            }
            html += '</div>';
        });
        list.innerHTML = html;
    }

    function copyHistoryItem(id) {
        const item = scanHistory.find(function(h) { return h.id === id; });
        if (item && navigator.clipboard) {
            navigator.clipboard.writeText(item.result).then(function() {
                showToast(t('copied'));
            });
        }
    }

    /* --- Toast --- */
    let toastTimer = null;
    function showToast(msg) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(function() { el.classList.remove('show'); }, 2200);
    }

    /* --- Init --- */
    document.addEventListener('DOMContentLoaded', function() {
        loadHistory();
        renderHistory();

        /* Tab switching */
        document.querySelectorAll('.tab-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
                document.querySelectorAll('.tab-content').forEach(function(c) { c.classList.remove('active'); });
                btn.classList.add('active');
                document.getElementById(btn.dataset.tab + 'Tab').classList.add('active');
            });
        });

        /* Camera */
        document.getElementById('startCamBtn').addEventListener('click', startCamera);
        document.getElementById('stopCamBtn').addEventListener('click', stopCamera);
        document.getElementById('torchBtn').addEventListener('click', toggleTorch);

        /* Drop Zone */
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');

        dropZone.addEventListener('click', function() { fileInput.click(); });

        dropZone.addEventListener('dragover', function(e) {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', function() {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', function(e) {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) scanImage(file);
        });

        fileInput.addEventListener('change', function() {
            if (this.files[0]) scanImage(this.files[0]);
        });

        /* QR Generator */
        document.getElementById('generateBtn').addEventListener('click', generateQR);
        document.getElementById('downloadBtn').addEventListener('click', downloadQR);

        document.getElementById('genInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') generateQR();
        });

        /* Language Toggle */
        document.getElementById('langToggle').addEventListener('click', function() {
            currentLang = currentLang === 'en' ? 'de' : 'en';
            applyLang();
        });

        /* Contrast Toggle */
        document.getElementById('contrastToggle').addEventListener('click', function() {
            const html = document.documentElement;
            const isHC = html.dataset.theme === 'high-contrast';
            html.dataset.theme = isHC ? 'dark' : 'high-contrast';
            this.classList.toggle('active', !isHC);
        });
    });
    </script>
