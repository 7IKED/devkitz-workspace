<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="dkz-version" content="v1.0.0">
  <title>🎨 Awesome Design Stitch — DEVKiTZ™</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --accent: #fa1e4e;
      --bg: #060608;
      --bg-card: #0e0e12;
      --bg-hover: #16161c;
      --text: #e8e8ec;
      --text-dim: #8888a0;
      --green: #00ff88;
      --yellow: #ffb800;
      --red: #ff3b5c;
      --border: #1e1e28;
      --radius: 12px;
      --glass: rgba(14, 14, 18, 0.8);
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      background-image:
        radial-gradient(circle at 20% 50%, rgba(250,30,78,0.08), transparent 40%),
        radial-gradient(circle at 80% 20%, rgba(0,255,136,0.05), transparent 40%);
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header h1 { font-size: 1.3rem; font-weight: 700; }
    .header h1 span { color: var(--accent); }
    .hub-btn {
      text-decoration: none;
      font-size: 1.4rem;
      padding: 6px 12px;
      border-radius: 8px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      transition: all 0.2s;
    }
    .hub-btn:hover { background: rgba(250,30,78,0.15); border-color: var(--accent); }

    /* Toolbar */
    .toolbar {
      padding: 16px 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }
    .search-box {
      flex: 1;
      min-width: 200px;
      max-width: 400px;
      padding: 10px 16px;
      background: rgba(0,0,0,0.4);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: inherit;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-box:focus { border-color: var(--accent); }
    .search-box::placeholder { color: var(--text-dim); }

    .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; }
    .filter-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      font-family: inherit;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn:hover { border-color: var(--text); color: var(--text); }
    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .stat-badge {
      margin-left: auto;
      font-size: 0.8rem;
      color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace;
    }

    /* Masonry Grid */
    .masonry {
      padding: 24px;
      columns: 3;
      column-gap: 20px;
    }
    @media (max-width: 1024px) { .masonry { columns: 2; } }
    @media (max-width: 640px) { .masonry { columns: 1; } }

    .design-card {
      break-inside: avoid;
      margin-bottom: 20px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s;
      cursor: pointer;
    }
    .design-card:hover {
      transform: translateY(-4px);
      border-color: rgba(250,30,78,0.4);
      box-shadow: 0 12px 40px rgba(0,0,0,0.5), 0 0 20px rgba(250,30,78,0.1);
    }
    .card-preview {
      width: 100%;
      aspect-ratio: 16/10;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      position: relative;
    }
    .card-preview .fav-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0,0,0,0.6);
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 6px 8px;
      border-radius: 8px;
      transition: transform 0.2s;
      z-index: 5;
    }
    .card-preview .fav-btn:hover { transform: scale(1.2); }
    .card-body { padding: 16px; }
    .card-body h3 { font-size: 1rem; font-weight: 600; margin-bottom: 6px; }
    .card-body p {
      font-size: 0.82rem;
      color: var(--text-dim);
      line-height: 1.5;
      margin-bottom: 10px;
    }
    .card-tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag {
      font-size: 0.7rem;
      padding: 3px 8px;
      border-radius: 6px;
      background: rgba(255,255,255,0.06);
      color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace;
    }
    .card-footer {
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.78rem;
      color: var(--text-dim);
    }
    .card-footer a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }
    .card-footer a:hover { text-decoration: underline; }

    /* Add Button */
    .add-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      color: #fff;
      font-size: 1.8rem;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(250,30,78,0.4);
      transition: transform 0.2s, box-shadow 0.2s;
      z-index: 90;
    }
    .add-btn:hover { transform: scale(1.1); box-shadow: 0 6px 30px rgba(250,30,78,0.6); }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(8px);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      max-width: 620px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      padding: 28px;
      position: relative;
    }
    .modal-close {
      position: absolute;
      top: 14px;
      right: 14px;
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 1.5rem;
      cursor: pointer;
    }
    .modal-close:hover { color: var(--text); }
    .modal h2 { font-size: 1.4rem; margin-bottom: 16px; }
    .modal-preview-area {
      width: 100%;
      aspect-ratio: 16/10;
      border-radius: var(--radius);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
    }
    .modal-desc { color: var(--text-dim); line-height: 1.6; margin-bottom: 16px; font-size: 0.9rem; }
    .modal-link {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
      font-size: 0.9rem;
    }
    .modal-link:hover { text-decoration: underline; }

    /* Add Form Modal */
    .form-group { margin-bottom: 14px; }
    .form-group label {
      display: block;
      font-size: 0.82rem;
      color: var(--text-dim);
      margin-bottom: 5px;
      font-weight: 500;
    }
    .form-input {
      width: 100%;
      padding: 10px 14px;
      background: rgba(0,0,0,0.4);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-input:focus { border-color: var(--accent); }
    .form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }
    .btn-primary {
      padding: 10px 20px;
      background: var(--accent);
      border: none;
      color: #fff;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-primary:hover { opacity: 0.85; }
    .btn-secondary {
      padding: 10px 20px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .btn-secondary:hover { border-color: var(--text); color: var(--text); }

    .empty-state {
      text-align: center;
      padding: 60px 24px;
      color: var(--text-dim);
    }
    .empty-state span { font-size: 3rem; display: block; margin-bottom: 16px; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-left">
      <a href="../hub/index.html" title="Hub" class="hub-btn">🏠</a>
      <h1>🎨 Awesome Design <span>Stitch</span></h1>
    </div>
  </div>

  <div class="toolbar">
    <input type="text" class="search-box" id="searchBox" placeholder="Design suchen...">
    <div class="filter-bar" id="filterBar">
      <button class="filter-btn active" data-cat="all">Alle</button>
      <button class="filter-btn" data-cat="glassmorphism">Glassmorphism</button>
      <button class="filter-btn" data-cat="brutalism">Brutalism</button>
      <button class="filter-btn" data-cat="neumorphism">Neumorphism</button>
      <button class="filter-btn" data-cat="minimalism">Minimalism</button>
      <button class="filter-btn" data-cat="retro">Retro</button>
      <button class="filter-btn" data-cat="3d">3D</button>
    </div>
    <span class="stat-badge" id="statBadge">0 Designs</span>
  </div>

  <div class="masonry" id="grid"></div>
  <div class="empty-state" id="emptyState" style="display:none;">
    <span>🎨</span>
    <p>Keine Designs gefunden. Fuege ein neues hinzu!</p>
  </div>

  <!-- Detail Modal -->
  <div class="modal-overlay" id="detailModal">
    <div class="modal">
      <button class="modal-close" id="detailClose">&times;</button>
      <div class="modal-preview-area" id="detailPreview"></div>
      <h2 id="detailTitle"></h2>
      <div class="card-tags" id="detailTags" style="margin-bottom:14px;"></div>
      <p class="modal-desc" id="detailDesc"></p>
      <a class="modal-link" id="detailLink" href="#" target="_blank" rel="noopener">Projekt oeffnen →</a>
    </div>
  </div>

  <!-- Add Modal -->
  <div class="modal-overlay" id="addModal">
    <div class="modal">
      <button class="modal-close" id="addClose">&times;</button>
      <h2>➕ Neues Design hinzufuegen</h2>
      <div class="form-group">
        <label>Name</label>
        <input type="text" class="form-input" id="formName" placeholder="Design Name">
      </div>
      <div class="form-group">
        <label>Beschreibung</label>
        <input type="text" class="form-input" id="formDesc" placeholder="Kurze Beschreibung">
      </div>
      <div class="form-group">
        <label>Kategorie</label>
        <select class="form-input" id="formCat">
          <option value="glassmorphism">Glassmorphism</option>
          <option value="brutalism">Brutalism</option>
          <option value="neumorphism">Neumorphism</option>
          <option value="minimalism">Minimalism</option>
          <option value="retro">Retro</option>
          <option value="3d">3D</option>
        </select>
      </div>
      <div class="form-group">
        <label>Tags (komma-getrennt)</label>
        <input type="text" class="form-input" id="formTags" placeholder="css, animation, dark">
      </div>
      <div class="form-group">
        <label>Link (optional)</label>
        <input type="url" class="form-input" id="formLink" placeholder="https://...">
      </div>
      <div class="form-actions">
        <button class="btn-secondary" id="addCancel">Abbrechen</button>
        <button class="btn-primary" id="addSave">Speichern</button>
      </div>
    </div>
  </div>

  <button class="add-btn" id="addBtn" title="Design hinzufuegen">+</button>

  <script>
    function esc(s) {
      const d = document.createElement('div');
      d.appendChild(document.createTextNode(s));
      return d.innerHTML;
    }

    const STORAGE_KEY = 'dkz-awesome-design-stitch';
    const COLORS = [
      'linear-gradient(135deg, #667eea, #764ba2)',
      'linear-gradient(135deg, #f093fb, #f5576c)',
      'linear-gradient(135deg, #4facfe, #00f2fe)',
      'linear-gradient(135deg, #43e97b, #38f9d7)',
      'linear-gradient(135deg, #fa709a, #fee140)',
      'linear-gradient(135deg, #a18cd1, #fbc2eb)',
      'linear-gradient(135deg, #fccb90, #d57eeb)',
      'linear-gradient(135deg, #e0c3fc, #8ec5fc)',
    ];
    const EMOJIS = ['💎','🔮','✨','🎯','🌈','🪐','⚡','🔥','🎪','🧊','🫧','🌀'];

    let designs = [];
    let favorites = new Set();
    let activeFilter = 'all';

    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          const data = JSON.parse(raw);
          designs = data.designs || [];
          favorites = new Set(data.favorites || []);
        }
        if (designs.length === 0) {
          designs = getDefaultDesigns();
          saveData();
        }
      } catch (e) {
        console.warn('Design Stitch: Daten laden fehlgeschlagen', e);
        designs = getDefaultDesigns();
      }
    }

    function saveData() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
          designs: designs,
          favorites: Array.from(favorites)
        }));
      } catch (e) {
        console.warn('Design Stitch: Speichern fehlgeschlagen', e);
      }
    }

    function getDefaultDesigns() {
      return [
        { id: 'd1', name: 'Glassmorphism Dashboard', desc: 'Frosted Glass Cards mit Blur-Effekten und subtilen Borders', cat: 'glassmorphism', tags: ['glass','blur','cards','dark'], link: '', created: Date.now() },
        { id: 'd2', name: 'Brutalist Portfolio', desc: 'Raw Typography, harte Kontraste, Anti-Design Aesthetik', cat: 'brutalism', tags: ['typography','contrast','raw'], link: '', created: Date.now() },
        { id: 'd3', name: 'Neomorphic Controls', desc: 'Soft UI Buttons und Inputs mit Inner/Outer Shadows', cat: 'neumorphism', tags: ['soft-ui','shadows','buttons'], link: '', created: Date.now() },
        { id: 'd4', name: 'Minimal Todo App', desc: 'Reduziertes Design mit maximal 2 Farben und viel Whitespace', cat: 'minimalism', tags: ['clean','whitespace','todo'], link: '', created: Date.now() },
        { id: 'd5', name: 'Retro Synthwave', desc: '80er Neon-Aesthetic mit Grid-Lines und Glow-Effekten', cat: 'retro', tags: ['neon','synthwave','glow','80s'], link: '', created: Date.now() },
        { id: 'd6', name: '3D Card Flip', desc: 'CSS 3D Transforms fuer interaktive Karten-Animationen', cat: '3d', tags: ['3d','transform','animation','css'], link: '', created: Date.now() },
        { id: 'd7', name: 'Aurora Glassmorphism', desc: 'Northern Lights Gradient hinter Frosted Glass Panels', cat: 'glassmorphism', tags: ['aurora','gradient','glass'], link: '', created: Date.now() },
        { id: 'd8', name: 'Swiss Grid Layout', desc: 'Strenges Grid-System inspiriert von Schweizer Typografie', cat: 'minimalism', tags: ['grid','swiss','typography'], link: '', created: Date.now() },
      ];
    }

    function getFiltered() {
      const q = document.getElementById('searchBox').value.toLowerCase().trim();
      return designs.filter(d => {
        if (activeFilter !== 'all' && d.cat !== activeFilter) return false;
        if (q) {
          const searchable = (d.name + ' ' + d.desc + ' ' + d.tags.join(' ')).toLowerCase();
          if (!searchable.includes(q)) return false;
        }
        return true;
      });
    }

    function renderGrid() {
      const grid = document.getElementById('grid');
      const empty = document.getElementById('emptyState');
      const filtered = getFiltered();
      document.getElementById('statBadge').textContent = filtered.length + ' Design' + (filtered.length !== 1 ? 's' : '');

      if (filtered.length === 0) {
        grid.style.display = 'none';
        empty.style.display = 'block';
        return;
      }
      grid.style.display = '';
      empty.style.display = 'none';

      grid.innerHTML = filtered.map((d, i) => {
        const isFav = favorites.has(d.id);
        const bg = COLORS[i % COLORS.length];
        const emoji = EMOJIS[i % EMOJIS.length];
        return '<div class="design-card" data-id="' + esc(d.id) + '">' +
          '<div class="card-preview" style="background:' + bg + '">' +
            '<button class="fav-btn" data-fav="' + esc(d.id) + '">' + (isFav ? '❤️' : '🤍') + '</button>' +
            emoji +
          '</div>' +
          '<div class="card-body">' +
            '<h3>' + esc(d.name) + '</h3>' +
            '<p>' + esc(d.desc) + '</p>' +
            '<div class="card-tags">' + d.tags.map(t => '<span class="tag">' + esc(t) + '</span>').join('') + '</div>' +
          '</div>' +
          '<div class="card-footer">' +
            '<span>' + esc(d.cat) + '</span>' +
            (d.link ? '<a href="' + esc(d.link) + '" target="_blank" rel="noopener" onclick="event.stopPropagation()">Link →</a>' : '<span>Lokal</span>') +
          '</div>' +
        '</div>';
      }).join('');
    }

    function openDetail(id) {
      const d = designs.find(x => x.id === id);
      if (!d) return;
      const idx = designs.indexOf(d);
      const bg = COLORS[idx % COLORS.length];
      const emoji = EMOJIS[idx % EMOJIS.length];
      document.getElementById('detailPreview').style.background = bg;
      document.getElementById('detailPreview').textContent = emoji;
      document.getElementById('detailTitle').textContent = d.name;
      document.getElementById('detailDesc').textContent = d.desc;
      document.getElementById('detailTags').innerHTML = d.tags.map(t => '<span class="tag">' + esc(t) + '</span>').join('');
      const link = document.getElementById('detailLink');
      if (d.link) {
        link.href = d.link;
        link.style.display = '';
      } else {
        link.style.display = 'none';
      }
      document.getElementById('detailModal').classList.add('open');
    }

    function toggleFav(id) {
      if (favorites.has(id)) favorites.delete(id);
      else favorites.add(id);
      saveData();
      renderGrid();
    }

    // Event: Grid clicks
    document.getElementById('grid').addEventListener('click', function(e) {
      const favBtn = e.target.closest('[data-fav]');
      if (favBtn) {
        e.stopPropagation();
        toggleFav(favBtn.dataset.fav);
        return;
      }
      const card = e.target.closest('.design-card');
      if (card) openDetail(card.dataset.id);
    });

    // Event: Filters
    document.getElementById('filterBar').addEventListener('click', function(e) {
      if (!e.target.classList.contains('filter-btn')) return;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      activeFilter = e.target.dataset.cat;
      renderGrid();
    });

    // Event: Search
    document.getElementById('searchBox').addEventListener('input', renderGrid);

    // Event: Modals
    document.getElementById('detailClose').addEventListener('click', function() {
      document.getElementById('detailModal').classList.remove('open');
    });
    document.getElementById('detailModal').addEventListener('click', function(e) {
      if (e.target === this) this.classList.remove('open');
    });

    document.getElementById('addBtn').addEventListener('click', function() {
      document.getElementById('addModal').classList.add('open');
    });
    document.getElementById('addClose').addEventListener('click', function() {
      document.getElementById('addModal').classList.remove('open');
    });
    document.getElementById('addCancel').addEventListener('click', function() {
      document.getElementById('addModal').classList.remove('open');
    });
    document.getElementById('addModal').addEventListener('click', function(e) {
      if (e.target === this) this.classList.remove('open');
    });

    // Event: Save new design
    document.getElementById('addSave').addEventListener('click', function() {
      try {
        const name = document.getElementById('formName').value.trim();
        const desc = document.getElementById('formDesc').value.trim();
        const cat = document.getElementById('formCat').value;
        const tags = document.getElementById('formTags').value.split(',').map(t => t.trim()).filter(Boolean);
        const link = document.getElementById('formLink').value.trim();
        if (!name) return;
        designs.unshift({
          id: 'd' + Date.now(),
          name: name,
          desc: desc || 'Keine Beschreibung',
          cat: cat,
          tags: tags.length ? tags : [cat],
          link: link,
          created: Date.now()
        });
        saveData();
        renderGrid();
        document.getElementById('addModal').classList.remove('open');
        document.getElementById('formName').value = '';
        document.getElementById('formDesc').value = '';
        document.getElementById('formTags').value = '';
        document.getElementById('formLink').value = '';
      } catch (e) {
        console.warn('Design Stitch: Speichern fehlgeschlagen', e);
      }
    });

    // Keyboard
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        document.getElementById('detailModal').classList.remove('open');
        document.getElementById('addModal').classList.remove('open');
      }
    });

    // Init
    loadData();
    renderGrid();
  </script>
</body>
</html>
