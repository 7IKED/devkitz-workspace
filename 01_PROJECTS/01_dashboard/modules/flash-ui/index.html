<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="dkz-version" content="v1.0.0">
  <title>⚡ Flash UI — DEVKiTZ™</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --accent: #fa1e4e;
      --bg: #060608;
      --bg-card: #0e0e12;
      --bg-hover: #16161c;
      --text: #e8e8ec;
      --text-dim: #8888a0;
      --green: #00ff88;
      --yellow: #ffb800;
      --red: #ff3b5c;
      --border: #1e1e28;
      --radius: 12px;
      --glass: rgba(14, 14, 18, 0.8);
      --editor-bg: #0a0a0f;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 16px;
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 100;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header h1 { font-size: 1.1rem; font-weight: 700; }
    .header h1 span { color: var(--accent); }
    .hub-btn {
      text-decoration: none;
      font-size: 1.2rem;
      padding: 4px 10px;
      border-radius: 6px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      transition: all 0.2s;
    }
    .hub-btn:hover { background: rgba(250,30,78,0.15); border-color: var(--accent); }
    .header-actions { display: flex; gap: 8px; align-items: center; }
    .action-btn {
      padding: 6px 14px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .action-btn:hover { border-color: var(--accent); color: var(--accent); }
    .action-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .action-btn.primary:hover { opacity: 0.85; }

    /* Project Selector */
    .project-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: rgba(0,0,0,0.3);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .project-select {
      padding: 5px 10px;
      background: rgba(0,0,0,0.4);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.82rem;
      outline: none;
      min-width: 180px;
    }
    .project-select:focus { border-color: var(--accent); }
    .proj-btn {
      padding: 4px 10px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-dim);
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .proj-btn:hover { border-color: var(--text); color: var(--text); }

    /* Main Split */
    .workspace {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* Editor Panel */
    .editor-panel {
      width: 50%;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      min-width: 300px;
    }

    .editor-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: rgba(0,0,0,0.2);
      flex-shrink: 0;
    }
    .editor-tab {
      padding: 8px 18px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .editor-tab:hover { color: var(--text); }
    .editor-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
      background: rgba(250,30,78,0.05);
    }
    .editor-tab .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
    }

    .editor-area { flex: 1; position: relative; }
    .code-editor {
      width: 100%;
      height: 100%;
      background: var(--editor-bg);
      color: var(--green);
      border: none;
      padding: 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      line-height: 1.6;
      resize: none;
      outline: none;
      tab-size: 2;
    }
    .code-editor::placeholder { color: rgba(136,136,160,0.4); }

    /* Preview Panel */
    .preview-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 300px;
    }
    .preview-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 16px;
      background: rgba(0,0,0,0.2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .preview-header span {
      font-size: 0.8rem;
      color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace;
    }
    .preview-frame {
      flex: 1;
      border: none;
      background: #fff;
    }

    /* Resize Handle */
    .resize-handle {
      width: 5px;
      background: var(--border);
      cursor: col-resize;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    .resize-handle:hover { background: var(--accent); }

    /* Template Drawer */
    .template-drawer {
      display: none;
      position: fixed;
      top: 0;
      right: 0;
      width: 320px;
      height: 100%;
      background: var(--bg-card);
      border-left: 1px solid var(--border);
      z-index: 200;
      flex-direction: column;
    }
    .template-drawer.open { display: flex; }
    .drawer-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }
    .drawer-header h3 { font-size: 1rem; }
    .drawer-close {
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 1.4rem;
      cursor: pointer;
    }
    .drawer-close:hover { color: var(--text); }
    .drawer-body { flex: 1; overflow-y: auto; padding: 12px; }
    .template-card {
      padding: 14px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .template-card:hover { border-color: var(--accent); background: rgba(250,30,78,0.05); }
    .template-card h4 { font-size: 0.9rem; margin-bottom: 4px; }
    .template-card p { font-size: 0.75rem; color: var(--text-dim); }

    /* Overlay for drawer */
    .drawer-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 190;
    }
    .drawer-overlay.open { display: block; }

    /* New Project Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(6px);
      z-index: 300;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      width: 380px;
      max-width: 90vw;
    }
    .modal h3 { margin-bottom: 16px; }
    .modal-input {
      width: 100%;
      padding: 10px 14px;
      background: rgba(0,0,0,0.4);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: inherit;
      outline: none;
      margin-bottom: 14px;
    }
    .modal-input:focus { border-color: var(--accent); }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

    /* Responsive */
    @media (max-width: 768px) {
      .workspace { flex-direction: column; }
      .editor-panel { width: 100%; min-width: unset; border-right: none; border-bottom: 1px solid var(--border); height: 50%; }
      .preview-panel { min-width: unset; }
      .resize-handle { display: none; }
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-left">
      <a href="../hub/index.html" title="Hub" class="hub-btn">🏠</a>
      <h1>⚡ Flash <span>UI</span></h1>
    </div>
    <div class="header-actions">
      <button class="action-btn" id="btnTemplates">📦 Templates</button>
      <button class="action-btn" id="btnExport">📋 Export</button>
      <button class="action-btn primary" id="btnRun">▶ Run</button>
    </div>
  </div>

  <div class="project-bar">
    <span style="font-size:0.8rem;color:var(--text-dim);">Projekt:</span>
    <select class="project-select" id="projectSelect"></select>
    <button class="proj-btn" id="btnNewProj" title="Neues Projekt">+</button>
    <button class="proj-btn" id="btnDelProj" title="Projekt loeschen">🗑️</button>
  </div>

  <div class="workspace">
    <div class="editor-panel" id="editorPanel">
      <div class="editor-tabs">
        <button class="editor-tab active" data-lang="html"><span class="dot" style="background:#e44d26;"></span>HTML</button>
        <button class="editor-tab" data-lang="css"><span class="dot" style="background:#264de4;"></span>CSS</button>
        <button class="editor-tab" data-lang="js"><span class="dot" style="background:var(--yellow);"></span>JS</button>
      </div>
      <div class="editor-area">
        <textarea class="code-editor" id="codeEditor" spellcheck="false" placeholder="Code hier eingeben..."></textarea>
      </div>
    </div>

    <div class="resize-handle" id="resizeHandle"></div>

    <div class="preview-panel">
      <div class="preview-header">
        <span>📺 Live Preview</span>
        <span id="previewStatus" style="color:var(--green);">● Ready</span>
      </div>
      <iframe class="preview-frame" id="previewFrame" sandbox="allow-scripts allow-modals"></iframe>
    </div>
  </div>

  <!-- Template Drawer -->
  <div class="drawer-overlay" id="drawerOverlay"></div>
  <div class="template-drawer" id="templateDrawer">
    <div class="drawer-header">
      <h3>📦 Templates</h3>
      <button class="drawer-close" id="drawerClose">&times;</button>
    </div>
    <div class="drawer-body" id="templateList"></div>
  </div>

  <!-- New Project Modal -->
  <div class="modal-overlay" id="newProjModal">
    <div class="modal">
      <h3>➕ Neues Projekt</h3>
      <input type="text" class="modal-input" id="newProjName" placeholder="Projekt Name">
      <div class="modal-actions">
        <button class="action-btn" id="newProjCancel">Abbrechen</button>
        <button class="action-btn primary" id="newProjSave">Erstellen</button>
      </div>
    </div>
  </div>

  <script>
    function esc(s) {
      var d = document.createElement('div');
      d.appendChild(document.createTextNode(s));
      return d.innerHTML;
    }

    var STORAGE_KEY = 'dkz-flash-ui';
    var activeLang = 'html';
    var activeProject = null;
    var projects = {};
    var debounceTimer = null;

    var TEMPLATES = [
      {
        name: 'DkZ Button',
        desc: 'Accent-farbiger Button mit Hover-Glow',
        html: '<button class="btn">Click Me</button>',
        css: '.btn {\n  padding: 12px 28px;\n  background: #fa1e4e;\n  color: #fff;\n  border: none;\n  border-radius: 8px;\n  font-size: 1rem;\n  font-weight: 600;\n  cursor: pointer;\n  transition: all 0.2s;\n}\n.btn:hover {\n  box-shadow: 0 0 20px rgba(250,30,78,0.5);\n  transform: translateY(-2px);\n}',
        js: ''
      },
      {
        name: 'Glass Card',
        desc: 'Glassmorphism Card mit Blur',
        html: '<div class="glass-card">\n  <h2>Glass Card</h2>\n  <p>Frosted glass UI element</p>\n</div>',
        css: 'body {\n  background: linear-gradient(135deg, #0a0a15, #1a1a2e);\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  min-height: 100vh;\n  font-family: sans-serif;\n  color: #fff;\n}\n.glass-card {\n  padding: 32px;\n  background: rgba(255,255,255,0.08);\n  backdrop-filter: blur(16px);\n  border: 1px solid rgba(255,255,255,0.12);\n  border-radius: 16px;\n  max-width: 360px;\n}\n.glass-card h2 { margin: 0 0 8px; }\n.glass-card p { color: #aaa; margin: 0; }',
        js: ''
      },
      {
        name: 'Modal Dialog',
        desc: 'Overlay Modal mit Backdrop',
        html: '<button class="open-btn" onclick="document.getElementById(\'modal\').style.display=\'flex\'">Modal oeffnen</button>\n<div id="modal" class="modal-bg" onclick="if(event.target===this)this.style.display=\'none\'">\n  <div class="modal-box">\n    <h2>Modal Title</h2>\n    <p>Content here...</p>\n    <button onclick="document.getElementById(\'modal\').style.display=\'none\'">Schliessen</button>\n  </div>\n</div>',
        css: 'body {\n  background: #0a0a12;\n  color: #fff;\n  font-family: sans-serif;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  min-height: 100vh;\n}\n.open-btn {\n  padding: 12px 24px;\n  background: #fa1e4e;\n  color: #fff;\n  border: none;\n  border-radius: 8px;\n  cursor: pointer;\n  font-size: 1rem;\n}\n.modal-bg {\n  display: none;\n  position: fixed;\n  inset: 0;\n  background: rgba(0,0,0,0.7);\n  align-items: center;\n  justify-content: center;\n}\n.modal-box {\n  background: #14141c;\n  border: 1px solid #2a2a36;\n  border-radius: 12px;\n  padding: 28px;\n  max-width: 400px;\n  width: 90%;\n}\n.modal-box h2 { margin: 0 0 10px; }\n.modal-box p { color: #888; margin: 0 0 16px; }\n.modal-box button {\n  padding: 8px 16px;\n  background: rgba(255,255,255,0.1);\n  border: 1px solid #333;\n  color: #fff;\n  border-radius: 6px;\n  cursor: pointer;\n}',
        js: ''
      },
      {
        name: 'Form Layout',
        desc: 'Dark Theme Form mit Labels',
        html: '<form class="form">\n  <div class="field">\n    <label>Name</label>\n    <input type="text" placeholder="Dein Name">\n  </div>\n  <div class="field">\n    <label>Email</label>\n    <input type="email" placeholder="mail@example.com">\n  </div>\n  <div class="field">\n    <label>Nachricht</label>\n    <textarea rows="3" placeholder="..."></textarea>\n  </div>\n  <button type="button">Senden</button>\n</form>',
        css: 'body {\n  background: #060608;\n  color: #e8e8ec;\n  font-family: sans-serif;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  min-height: 100vh;\n}\n.form {\n  width: 360px;\n  padding: 28px;\n  background: #0e0e12;\n  border: 1px solid #1e1e28;\n  border-radius: 12px;\n}\n.field { margin-bottom: 14px; }\n.field label {\n  display: block;\n  font-size: 0.82rem;\n  color: #8888a0;\n  margin-bottom: 5px;\n}\n.field input, .field textarea {\n  width: 100%;\n  padding: 10px 12px;\n  background: rgba(0,0,0,0.4);\n  border: 1px solid #1e1e28;\n  border-radius: 6px;\n  color: #e8e8ec;\n  font-family: inherit;\n  outline: none;\n}\n.field input:focus, .field textarea:focus { border-color: #fa1e4e; }\nbutton {\n  width: 100%;\n  padding: 12px;\n  background: #fa1e4e;\n  color: #fff;\n  border: none;\n  border-radius: 8px;\n  font-weight: 600;\n  cursor: pointer;\n  margin-top: 8px;\n}',
        js: ''
      },
      {
        name: 'Loading Spinner',
        desc: 'CSS-only animierter Spinner',
        html: '<div class="spinner"></div>',
        css: 'body {\n  background: #060608;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  min-height: 100vh;\n}\n.spinner {\n  width: 48px;\n  height: 48px;\n  border: 3px solid rgba(255,255,255,0.1);\n  border-top: 3px solid #fa1e4e;\n  border-radius: 50%;\n  animation: spin 0.8s linear infinite;\n}\n@keyframes spin {\n  to { transform: rotate(360deg); }\n}',
        js: ''
      },
      {
        name: 'Notification Toast',
        desc: 'Slide-in Notification',
        html: '<button id="toastBtn">Toast zeigen</button>\n<div id="toastContainer"></div>',
        css: 'body {\n  background: #060608;\n  color: #fff;\n  font-family: sans-serif;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  min-height: 100vh;\n}\nbutton {\n  padding: 12px 24px;\n  background: #fa1e4e;\n  color: #fff;\n  border: none;\n  border-radius: 8px;\n  cursor: pointer;\n  font-size: 1rem;\n}\n#toastContainer {\n  position: fixed;\n  top: 16px;\n  right: 16px;\n}\n.toast {\n  background: #0e0e12;\n  border: 1px solid #1e1e28;\n  border-left: 3px solid #00ff88;\n  padding: 12px 18px;\n  border-radius: 8px;\n  margin-bottom: 8px;\n  animation: slideIn 0.3s ease;\n  font-size: 0.9rem;\n}\n@keyframes slideIn {\n  from { transform: translateX(100%); opacity: 0; }\n  to { transform: translateX(0); opacity: 1; }\n}',
        js: 'document.getElementById("toastBtn").addEventListener("click", function() {\n  var c = document.getElementById("toastContainer");\n  var t = document.createElement("div");\n  t.className = "toast";\n  t.textContent = "✅ Notification " + new Date().toLocaleTimeString();\n  c.appendChild(t);\n  setTimeout(function() { t.remove(); }, 3000);\n});'
      }
    ];

    function loadProjects() {
      try {
        var raw = localStorage.getItem(STORAGE_KEY);
        if (raw) projects = JSON.parse(raw) || {};
        if (Object.keys(projects).length === 0) {
          projects['Playground'] = { html: '<h1>Hello Flash UI!</h1>\n<p>Start prototyping...</p>', css: 'body {\n  background: #060608;\n  color: #e8e8ec;\n  font-family: sans-serif;\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  justify-content: center;\n  min-height: 100vh;\n}\nh1 { color: #fa1e4e; }', js: '' };
          saveProjects();
        }
      } catch (e) {
        console.warn('Flash UI: Laden fehlgeschlagen', e);
        projects['Playground'] = { html: '', css: '', js: '' };
      }
    }

    function saveProjects() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(projects));
      } catch (e) {
        console.warn('Flash UI: Speichern fehlgeschlagen', e);
      }
    }

    function renderProjectSelect() {
      var sel = document.getElementById('projectSelect');
      var names = Object.keys(projects);
      sel.innerHTML = names.map(function(n) { return '<option value="' + esc(n) + '">' + esc(n) + '</option>'; }).join('');
      if (!activeProject || !projects[activeProject]) {
        activeProject = names[0] || null;
      }
      if (activeProject) sel.value = activeProject;
    }

    function loadEditor() {
      if (!activeProject || !projects[activeProject]) return;
      var code = projects[activeProject][activeLang] || '';
      document.getElementById('codeEditor').value = code;
    }

    function saveCurrentCode() {
      if (!activeProject) return;
      projects[activeProject][activeLang] = document.getElementById('codeEditor').value;
      saveProjects();
    }

    function runPreview() {
      if (!activeProject) return;
      saveCurrentCode();
      var p = projects[activeProject];
      var doc = '<!DOCTYPE html><html><head><meta charset="UTF-8"><style>' +
        (p.css || '') + '</style></head><body>' +
        (p.html || '') +
        '<script>' + (p.js || '') + '<\/script></body></html>';
      var frame = document.getElementById('previewFrame');
      try {
        frame.srcdoc = doc;
        document.getElementById('previewStatus').textContent = '● Ready';
        document.getElementById('previewStatus').style.color = 'var(--green)';
      } catch (e) {
        document.getElementById('previewStatus').textContent = '● Error';
        document.getElementById('previewStatus').style.color = 'var(--red)';
        console.warn('Flash UI: Preview fehlgeschlagen', e);
      }
    }

    // Tab switching
    document.querySelectorAll('.editor-tab').forEach(function(tab) {
      tab.addEventListener('click', function() {
        saveCurrentCode();
        document.querySelectorAll('.editor-tab').forEach(function(t) { t.classList.remove('active'); });
        tab.classList.add('active');
        activeLang = tab.dataset.lang;
        loadEditor();
      });
    });

    // Auto-preview on typing
    document.getElementById('codeEditor').addEventListener('input', function() {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(function() { runPreview(); }, 400);
    });

    // Tab key in editor
    document.getElementById('codeEditor').addEventListener('keydown', function(e) {
      if (e.key === 'Tab') {
        e.preventDefault();
        var s = this.selectionStart;
        var end = this.selectionEnd;
        this.value = this.value.substring(0, s) + '  ' + this.value.substring(end);
        this.selectionStart = this.selectionEnd = s + 2;
      }
    });

    // Run button
    document.getElementById('btnRun').addEventListener('click', runPreview);

    // Export
    document.getElementById('btnExport').addEventListener('click', function() {
      try {
        if (!activeProject) return;
        var p = projects[activeProject];
        var full = '<!DOCTYPE html>\n<html lang="de">\n<head>\n  <meta charset="UTF-8">\n  <meta name="viewport" content="width=device-width, initial-scale=1.0">\n  <title>' +
          esc(activeProject) + '</title>\n  <style>\n' + (p.css || '') + '\n  </style>\n</head>\n<body>\n' +
          (p.html || '') + '\n  <script>\n' + (p.js || '') + '\n  <\/script>\n</body>\n</html>';
        navigator.clipboard.writeText(full).then(function() {
          var btn = document.getElementById('btnExport');
          btn.textContent = '✅ Kopiert!';
          setTimeout(function() { btn.textContent = '📋 Export'; }, 1500);
        });
      } catch (e) {
        console.warn('Flash UI: Export fehlgeschlagen', e);
      }
    });

    // Project select
    document.getElementById('projectSelect').addEventListener('change', function() {
      saveCurrentCode();
      activeProject = this.value;
      loadEditor();
      runPreview();
    });

    // New project
    document.getElementById('btnNewProj').addEventListener('click', function() {
      document.getElementById('newProjModal').classList.add('open');
      document.getElementById('newProjName').value = '';
      document.getElementById('newProjName').focus();
    });
    document.getElementById('newProjCancel').addEventListener('click', function() {
      document.getElementById('newProjModal').classList.remove('open');
    });
    document.getElementById('newProjSave').addEventListener('click', function() {
      var name = document.getElementById('newProjName').value.trim();
      if (!name) return;
      if (projects[name]) return;
      saveCurrentCode();
      projects[name] = { html: '', css: '', js: '' };
      activeProject = name;
      saveProjects();
      renderProjectSelect();
      loadEditor();
      runPreview();
      document.getElementById('newProjModal').classList.remove('open');
    });
    document.getElementById('newProjModal').addEventListener('click', function(e) {
      if (e.target === this) this.classList.remove('open');
    });

    // Delete project
    document.getElementById('btnDelProj').addEventListener('click', function() {
      if (!activeProject) return;
      if (Object.keys(projects).length <= 1) return;
      delete projects[activeProject];
      activeProject = Object.keys(projects)[0];
      saveProjects();
      renderProjectSelect();
      loadEditor();
      runPreview();
    });

    // Templates drawer
    document.getElementById('btnTemplates').addEventListener('click', function() {
      document.getElementById('templateDrawer').classList.add('open');
      document.getElementById('drawerOverlay').classList.add('open');
      renderTemplates();
    });
    document.getElementById('drawerClose').addEventListener('click', closeDrawer);
    document.getElementById('drawerOverlay').addEventListener('click', closeDrawer);
    function closeDrawer() {
      document.getElementById('templateDrawer').classList.remove('open');
      document.getElementById('drawerOverlay').classList.remove('open');
    }

    function renderTemplates() {
      document.getElementById('templateList').innerHTML = TEMPLATES.map(function(t, i) {
        return '<div class="template-card" data-tpl="' + i + '">' +
          '<h4>' + esc(t.name) + '</h4>' +
          '<p>' + esc(t.desc) + '</p>' +
        '</div>';
      }).join('');
    }

    document.getElementById('templateList').addEventListener('click', function(e) {
      var card = e.target.closest('[data-tpl]');
      if (!card) return;
      var tpl = TEMPLATES[parseInt(card.dataset.tpl)];
      if (!tpl || !activeProject) return;
      projects[activeProject] = { html: tpl.html, css: tpl.css, js: tpl.js };
      saveProjects();
      loadEditor();
      runPreview();
      closeDrawer();
    });

    // Resize handle
    (function() {
      var handle = document.getElementById('resizeHandle');
      var panel = document.getElementById('editorPanel');
      var dragging = false;

      handle.addEventListener('mousedown', function(e) {
        dragging = true;
        e.preventDefault();
      });

      document.addEventListener('mousemove', function(e) {
        if (!dragging) return;
        var w = e.clientX;
        var min = 280, max = window.innerWidth - 280;
        if (w < min) w = min;
        if (w > max) w = max;
        panel.style.width = w + 'px';
      });

      document.addEventListener('mouseup', function() { dragging = false; });
    })();

    // Keyboard shortcuts
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        document.getElementById('newProjModal').classList.remove('open');
        closeDrawer();
      }
    });

    // Init
    loadProjects();
    renderProjectSelect();
    loadEditor();
    runPreview();
  </script>
</body>
</html>
