<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="dkz-version" content="v1.00.0_01">
<title>DkZ Template Hub — Design Templates Collection</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#060608;--bg2:#0a0a0f;--surface:#0d0d14;--surface2:#12121c;
  --glass:rgba(255,255,255,0.03);--glass2:rgba(255,255,255,0.06);
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.12);
  --text:#e8e8f0;--text2:#8888a0;--text3:#555570;
  --accent:#fa1e4e;--green:#00ff88;--yellow:#ffb800;--red:#ff3b5c;
  --blue:#3b82f6;--purple:#a855f7;--cyan:#06b6d4;
  --font:'Inter',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh}

.th-header{
  background:linear-gradient(135deg,var(--bg2),var(--surface));
  border-bottom:1px solid var(--border);padding:12px 24px;
  display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;
  backdrop-filter:blur(20px);
}
.th-header .hub-btn{background:var(--glass2);border:1px solid var(--border2);border-radius:8px;color:var(--text);padding:8px 12px;text-decoration:none;font-size:13px;transition:all .2s}
.th-header .hub-btn:hover{background:var(--accent)}
.th-header h1{font-size:18px;font-weight:700;background:linear-gradient(135deg,var(--yellow),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.th-header .search{
  margin-left:auto;background:var(--glass);border:1px solid var(--border);
  border-radius:8px;padding:8px 14px;color:var(--text);font-family:var(--font);
  font-size:13px;width:260px;outline:none;
}
.th-header .search:focus{border-color:var(--green)}
.th-header .view-toggle{display:flex;gap:2px;margin-left:8px}
.th-header .vt-btn{
  background:var(--glass);border:1px solid var(--border);padding:6px 10px;
  color:var(--text3);cursor:pointer;font-size:14px;transition:all .2s;
}
.th-header .vt-btn:first-child{border-radius:6px 0 0 6px}
.th-header .vt-btn:last-child{border-radius:0 6px 6px 0}
.th-header .vt-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* MENU BAR */
.th-menu{
  background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;overflow-x:auto;padding:0 24px;
}
.th-menu .menu-item{
  padding:10px 18px;font-size:12px;font-weight:500;color:var(--text3);
  cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;
  transition:all .15s;display:flex;align-items:center;gap:6px;
}
.th-menu .menu-item:hover{color:var(--text);background:var(--glass)}
.th-menu .menu-item.active{color:var(--green);border-bottom-color:var(--green)}
.th-menu .menu-count{
  background:var(--glass2);border-radius:10px;padding:1px 7px;
  font-size:10px;font-family:var(--mono);color:var(--text3);
}

/* TEMPLATE GRID */
.th-main{padding:24px}
.th-stats{display:flex;gap:16px;margin-bottom:24px;flex-wrap:wrap}
.th-stat{
  background:var(--glass);border:1px solid var(--border);border-radius:10px;
  padding:12px 20px;display:flex;align-items:center;gap:10px;
}
.th-stat .val{font-size:24px;font-weight:900;font-family:var(--mono);color:var(--green)}
.th-stat .label{font-size:11px;color:var(--text3)}

.template-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:16px;
}
.template-grid.list-view{grid-template-columns:1fr}

.tpl-card{
  background:var(--glass);border:1px solid var(--border);border-radius:12px;
  overflow:hidden;cursor:pointer;transition:all .25s;position:relative;
}
.tpl-card:hover{border-color:var(--cyan);transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,.4)}
.tpl-preview{
  height:160px;background:var(--surface);position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
.tpl-preview .tpl-icon{font-size:48px;opacity:.6}
.tpl-preview .tpl-badge{
  position:absolute;top:8px;right:8px;background:rgba(0,0,0,.6);
  border-radius:6px;padding:3px 8px;font-size:10px;color:var(--green);
  font-family:var(--mono);backdrop-filter:blur(8px);
}
.tpl-info{padding:14px}
.tpl-info h3{font-size:14px;font-weight:600;margin-bottom:4px}
.tpl-info p{font-size:11px;color:var(--text3);line-height:1.5}
.tpl-info .tpl-tags{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap}
.tpl-info .tpl-tag{
  background:var(--glass2);border-radius:4px;padding:2px 6px;
  font-size:9px;color:var(--text3);font-family:var(--mono);
}
.tpl-info .tpl-footer{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:10px;padding-top:10px;border-top:1px solid var(--border);
}
.tpl-info .tpl-use{
  background:var(--green);color:#000;border:none;border-radius:6px;
  padding:5px 12px;font-size:11px;font-weight:600;cursor:pointer;
  transition:all .2s;font-family:var(--font);
}
.tpl-info .tpl-use:hover{filter:brightness(1.1);transform:scale(1.05)}
.tpl-info .tpl-version{font-size:10px;color:var(--text3);font-family:var(--mono)}

/* LIST VIEW */
.list-view .tpl-card{display:flex;flex-direction:row}
.list-view .tpl-preview{width:120px;height:auto;min-height:100px;flex-shrink:0}
.list-view .tpl-info{flex:1}

/* DETAIL MODAL */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;
  display:none;align-items:center;justify-content:center;
  backdrop-filter:blur(8px);
}
.modal-overlay.show{display:flex}
.modal{
  background:var(--bg2);border:1px solid var(--border2);border-radius:16px;
  width:90%;max-width:800px;max-height:85vh;overflow-y:auto;padding:32px;
}
.modal h2{font-size:22px;font-weight:700;margin-bottom:16px}
.modal .close{
  float:right;background:var(--glass2);border:1px solid var(--border);
  border-radius:8px;padding:6px 12px;color:var(--text);cursor:pointer;
  font-size:16px;
}
.modal pre{
  background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:16px;font-family:var(--mono);font-size:12px;color:var(--green);
  overflow-x:auto;margin:12px 0;
}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .3s ease forwards;opacity:0}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>
</head>
<body>

<header class="th-header">
  <a href="../../hub/index.html" class="hub-btn">◀ Hub</a>
  <h1>📐 Template Hub</h1>
  <input type="text" class="search" id="tplSearch" placeholder="Search templates...">
  <div class="view-toggle">
    <div class="vt-btn active" onclick="setView('grid')" title="Grid">▦</div>
    <div class="vt-btn" onclick="setView('list')" title="List">☰</div>
  </div>
</header>

<nav class="th-menu" id="menuBar"></nav>

<main class="th-main">
  <div class="th-stats" id="statsBar"></div>
  <div class="template-grid" id="templateGrid"></div>
</main>

<div class="modal-overlay" id="modal">
  <div class="modal" id="modalContent"></div>
</div>

<script>
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

const CATEGORIES = [
  {id:'all',name:'All Templates',icon:'📋'},
  {id:'module',name:'Module',icon:'📦'},
  {id:'layout',name:'Layouts',icon:'📐'},
  {id:'card',name:'Cards',icon:'🃏'},
  {id:'form',name:'Forms',icon:'📝'},
  {id:'nav',name:'Navigation',icon:'🧭'},
  {id:'chart',name:'Charts',icon:'📊'},
  {id:'landing',name:'Landing Pages',icon:'🚀'},
  {id:'widget',name:'Widgets',icon:'🧩'},
  {id:'animation',name:'Animations',icon:'✨'}
];

const TEMPLATES = [
  {id:1,cat:'module',icon:'📦',name:'Standard Module',desc:'DkZ Standard Module Boilerplate with header, stats bar, main content area, shared scripts, and premium design.',tags:['html','css','js','module'],version:'v2.0',code:'<!DOCTYPE html>\\n<html lang="en">\\n<!-- DkZ Module Template -->\\n<head>\\n  <meta name="dkz-version" content="v1.00.0_01">\\n  <!-- Google Fonts + DkZ CSS -->\\n</head>\\n<body>\\n  <header class="dkz-header">\\n    <a href="../../hub/" class="hub-btn">Hub</a>\\n    <h1>Module Name</h1>\\n  </header>\\n  <main class="dkz-main">\\n    <!-- Content -->\\n  </main>\\n  <script src="../../shared/dkz-premium.js"><\\/script>\\n</body>'},
  {id:2,cat:'card',icon:'🃏',name:'Glassmorphism Card',desc:'Frosted glass effect card with hover glow, gradient border animation, and backdrop blur.',tags:['css','glassmorphism','card'],version:'v1.0',code:'.glass-card {\\n  background: rgba(255,255,255,0.03);\\n  border: 1px solid rgba(255,255,255,0.06);\\n  border-radius: 12px;\\n  backdrop-filter: blur(20px);\\n  padding: 20px;\\n  transition: all 0.25s;\\n}\\n.glass-card:hover {\\n  border-color: var(--cyan);\\n  box-shadow: 0 8px 32px rgba(6,182,212,0.15);\\n}'},
  {id:3,cat:'card',icon:'📊',name:'Stats Card',desc:'Numeric stat display with mono font, icon, label, and neon accent color.',tags:['css','stats','dashboard'],version:'v1.0',code:'.stat-card {\\n  background: var(--glass);\\n  border: 1px solid var(--border);\\n  border-radius: 10px;\\n  padding: 16px;\\n  text-align: center;\\n}\\n.stat-val {\\n  font-size: 28px;\\n  font-weight: 900;\\n  font-family: var(--mono);\\n  color: var(--green);\\n}'},
  {id:4,cat:'nav',icon:'🧭',name:'Sticky Header',desc:'Glassmorphism sticky header with hub button, title, search, and action buttons.',tags:['css','header','sticky','nav'],version:'v1.0',code:'.dkz-header {\\n  position: sticky;\\n  top: 0;\\n  z-index: 100;\\n  background: linear-gradient(135deg, var(--bg2), var(--surface));\\n  border-bottom: 1px solid var(--border);\\n  backdrop-filter: blur(20px);\\n  padding: 16px 24px;\\n}'},
  {id:5,cat:'nav',icon:'📑',name:'Tab Navigation',desc:'Horizontal tab bar with active state, underline indicator, and smooth transitions.',tags:['css','tabs','navigation'],version:'v1.0',code:'.tab {\\n  padding: 10px 18px;\\n  font-size: 12px;\\n  color: var(--text3);\\n  cursor: pointer;\\n  border-bottom: 2px solid transparent;\\n}\\n.tab.active {\\n  color: var(--green);\\n  border-bottom-color: var(--green);\\n}'},
  {id:6,cat:'form',icon:'📝',name:'Input Field',desc:'DkZ styled input with focus glow, placeholder styling, and validation states.',tags:['css','form','input'],version:'v1.0',code:'.dkz-input {\\n  background: var(--glass);\\n  border: 1px solid var(--border);\\n  border-radius: 8px;\\n  padding: 10px 14px;\\n  color: var(--text);\\n  font-family: var(--font);\\n  outline: none;\\n}\\n.dkz-input:focus {\\n  border-color: var(--green);\\n  box-shadow: 0 0 12px rgba(0,255,136,0.1);\\n}'},
  {id:7,cat:'layout',icon:'📐',name:'Sidebar Layout',desc:'280px sidebar with scrollable nav and fluid main content area.',tags:['css','layout','sidebar'],version:'v1.0',code:'.layout {\\n  display: flex;\\n  height: 100vh;\\n}\\n.sidebar {\\n  width: 280px;\\n  background: var(--bg2);\\n  border-right: 1px solid var(--border);\\n  overflow-y: auto;\\n}\\n.main { flex: 1; overflow-y: auto; }'},
  {id:8,cat:'layout',icon:'🔲',name:'Module Grid',desc:'Auto-fill responsive grid for module/card layouts with gap.',tags:['css','grid','responsive'],version:'v1.0',code:'.module-grid {\\n  display: grid;\\n  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));\\n  gap: 12px;\\n}'},
  {id:9,cat:'chart',icon:'📈',name:'Progress Bar',desc:'Gradient progress bar with percentage label and animation.',tags:['css','chart','progress'],version:'v1.0',code:'.progress-track {\\n  background: var(--glass);\\n  border-radius: 6px;\\n  height: 8px;\\n  overflow: hidden;\\n}\\n.progress-fill {\\n  height: 100%;\\n  background: linear-gradient(90deg, var(--green), var(--cyan));\\n  border-radius: 6px;\\n  transition: width 0.5s;\\n}'},
  {id:10,cat:'animation',icon:'✨',name:'Fade Up Entry',desc:'Staggered fade-in animation for content elements.',tags:['css','animation','fadeIn'],version:'v1.0',code:'@keyframes fadeUp {\\n  from { opacity: 0; transform: translateY(12px); }\\n  to { opacity: 1; transform: translateY(0); }\\n}\\n.fade-up {\\n  animation: fadeUp 0.4s ease forwards;\\n  opacity: 0;\\n}\\n.fade-up:nth-child(2) { animation-delay: 0.05s; }\\n.fade-up:nth-child(3) { animation-delay: 0.1s; }'},
  {id:11,cat:'animation',icon:'💚',name:'Neon Glow Pulse',desc:'Pulsating green glow animation for status indicators.',tags:['css','animation','glow'],version:'v1.0',code:'@keyframes glowPulse {\\n  0%, 100% { box-shadow: 0 0 8px var(--green); }\\n  50% { box-shadow: 0 0 20px var(--green), 0 0 40px rgba(0,255,136,0.2); }\\n}\\n.glow { animation: glowPulse 2s infinite; }'},
  {id:12,cat:'animation',icon:'🌊',name:'Canvas Particles',desc:'Animated particle background using Canvas API.',tags:['js','canvas','animation'],version:'v1.0',code:'const canvas = document.getElementById("bg");\\nconst ctx = canvas.getContext("2d");\\nconst particles = Array.from({length:60}, () => ({\\n  x: Math.random()*canvas.width,\\n  y: Math.random()*canvas.height,\\n  vx: (Math.random()-0.5)*0.3,\\n  vy: (Math.random()-0.5)*0.3,\\n  r: Math.random()*2+1\\n}));'},
  {id:13,cat:'widget',icon:'🧩',name:'Status Widget',desc:'Small status indicator widget with icon, label, and color-coded state.',tags:['html','css','widget'],version:'v1.0',code:'<div class="status-widget">\\n  <span class="dot green"></span>\\n  <span class="label">System Online</span>\\n  <span class="time">2ms</span>\\n</div>'},
  {id:14,cat:'landing',icon:'🚀',name:'Hero Section',desc:'Full-width hero with gradient text, subtitle, CTA buttons, and particle background.',tags:['html','css','landing'],version:'v1.0',code:'.hero {\\n  min-height: 80vh;\\n  display: flex;\\n  flex-direction: column;\\n  align-items: center;\\n  justify-content: center;\\n  text-align: center;\\n}\\n.hero h1 {\\n  font-size: 56px;\\n  font-weight: 900;\\n  background: linear-gradient(135deg, var(--accent), var(--yellow));\\n  -webkit-background-clip: text;\\n  -webkit-text-fill-color: transparent;\\n}'},
  {id:15,cat:'module',icon:'🔒',name:'DEEPKEEP Module',desc:'Write-Once Tresor template with drag-drop upload, catalog table, and 7-day rule.',tags:['html','module','archive'],version:'v1.0',code:'<!-- DEEPKEEP Template -->\\n<!-- Upload Zone + Ordnerstruktur + Katalog -->'},
  {id:16,cat:'widget',icon:'⏱️',name:'Timer Widget',desc:'Countdown or stopwatch widget with DkZ styling.',tags:['js','widget','timer'],version:'v1.0',code:'setInterval(() => {\\n  const now = new Date();\\n  el.textContent = now.toLocaleTimeString();\\n}, 1000);'}
];

let currentCat = 'all';
let currentView = 'grid';

// === BUILD MENU ===
function buildMenu(){
  const menu = document.getElementById('menuBar');
  menu.innerHTML = CATEGORIES.map(c => {
    const count = c.id === 'all' ? TEMPLATES.length : TEMPLATES.filter(t => t.cat === c.id).length;
    return '<div class="menu-item' + (c.id === currentCat ? ' active' : '') + '" onclick="filterCat(\'' + esc(c.id) + '\')">' +
      '<span>' + esc(c.icon) + '</span> ' + esc(c.name) +
      ' <span class="menu-count">' + count + '</span></div>';
  }).join('');
}

// === BUILD STATS ===
function buildStats(){
  document.getElementById('statsBar').innerHTML = [
    {v:TEMPLATES.length,l:'Templates'},
    {v:CATEGORIES.length-1,l:'Categories'},
    {v:new Set(TEMPLATES.flatMap(t=>t.tags)).size,l:'Tags'},
    {v:'v2.0',l:'Design System'}
  ].map(s => '<div class="th-stat"><div class="val">' + esc(String(s.v)) + '</div><div class="label">' + esc(s.l) + '</div></div>').join('');
}

// === RENDER TEMPLATES ===
function renderTemplates(filter){
  const grid = document.getElementById('templateGrid');
  let filtered = filter && filter !== 'all' ? TEMPLATES.filter(t => t.cat === filter) : TEMPLATES;
  const q = document.getElementById('tplSearch').value.toLowerCase();
  if(q) filtered = filtered.filter(t => t.name.toLowerCase().includes(q) || t.desc.toLowerCase().includes(q) || t.tags.some(tag => tag.includes(q)));
  grid.innerHTML = filtered.map((t,i) =>
    '<div class="tpl-card fade-up" style="animation-delay:' + (i*0.03) + 's" onclick="showDetail(' + t.id + ')">' +
    '<div class="tpl-preview"><span class="tpl-icon">' + esc(t.icon) + '</span><span class="tpl-badge">' + esc(t.cat) + '</span></div>' +
    '<div class="tpl-info"><h3>' + esc(t.name) + '</h3><p>' + esc(t.desc) + '</p>' +
    '<div class="tpl-tags">' + t.tags.map(tag => '<span class="tpl-tag">' + esc(tag) + '</span>').join('') + '</div>' +
    '<div class="tpl-footer"><span class="tpl-version">' + esc(t.version) + '</span>' +
    '<button class="tpl-use" onclick="event.stopPropagation();copyCode(' + t.id + ')">Copy Code</button></div></div></div>'
  ).join('');
  if(!filtered.length) grid.innerHTML = '<p style="color:var(--text3);padding:40px;text-align:center">No templates found.</p>';
}

function filterCat(cat){currentCat=cat;buildMenu();renderTemplates(cat)}
function setView(v){
  currentView=v;
  document.getElementById('templateGrid').className='template-grid'+(v==='list'?' list-view':'');
  document.querySelectorAll('.vt-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('.vt-btn[onclick*="'+v+'"]').classList.add('active');
}

function showDetail(id){
  const t = TEMPLATES.find(x=>x.id===id);
  if(!t) return;
  const modal = document.getElementById('modal');
  document.getElementById('modalContent').innerHTML =
    '<button class="close" onclick="closeModal()">✕</button>' +
    '<h2>' + esc(t.icon) + ' ' + esc(t.name) + '</h2>' +
    '<p style="color:var(--text2);margin-bottom:16px">' + esc(t.desc) + '</p>' +
    '<div style="display:flex;gap:6px;margin-bottom:16px">' + t.tags.map(tag=>'<span class="tpl-tag" style="font-size:11px;padding:3px 8px">'+esc(tag)+'</span>').join('') + '</div>' +
    '<h3 style="font-size:14px;color:var(--cyan);margin-bottom:8px">Code</h3>' +
    '<pre>' + esc(t.code.replace(/\\n/g, '\n')) + '</pre>' +
    '<button class="tpl-use" style="margin-top:12px" onclick="copyCode('+t.id+')">📋 Copy to Clipboard</button>';
  modal.classList.add('show');
}
function closeModal(){document.getElementById('modal').classList.remove('show')}
function copyCode(id){
  const t=TEMPLATES.find(x=>x.id===id);
  if(t) navigator.clipboard.writeText(t.code.replace(/\\n/g,'\n'));
}

document.getElementById('tplSearch').addEventListener('input', ()=>renderTemplates(currentCat));
document.getElementById('modal').addEventListener('click', e=>{if(e.target.id==='modal')closeModal()});
document.addEventListener('keydown', e=>{if(e.key==='Escape')closeModal()});

// === INIT ===
buildMenu();
buildStats();
renderTemplates('all');
</script>

<script src="../../shared/dkz-debug.js" defer></script>
<script src="../../shared/dkz-guide.js" defer></script>
<script src="../../shared/dkz-copilot.js" defer></script>
<script src="../../shared/dkz-james.js" defer></script>
<script src="../../shared/dkz-navbar.js" defer></script>
<script src="../../shared/dkz-console.js" defer></script>
<script src="../../shared/dkz-premium.js" defer></script>
</body>
</html>
