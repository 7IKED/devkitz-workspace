events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # Rate Limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=webhook:10m rate=60r/m;

    server {
        listen 80;
        server_name _;

        # PWA App (Handy + Desktop)
        location /copilot {
            alias /usr/share/nginx/html/copilot;
            try_files $uri $uri/ /copilot/index.html;
        }

        # DkZ CoPilot API
        location /api/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://dkz-copilot:3050/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # GitHub Webhook
        location /webhook {
            limit_req zone=webhook burst=20 nodelay;
            proxy_pass http://dkz-copilot:3050/webhook;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Hub-Signature-256 $http_x_hub_signature_256;
        }

        # OpenHands UI
        location /openhands/ {
            proxy_pass http://openhands:3000/;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # n8n
        location /n8n/ {
            proxy_pass http://n8n:5678/;
            proxy_set_header Host $host;
        }

        # WebSocket fuer Live-Logs
        location /ws {
            proxy_pass http://dkz-copilot:3050/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Health
        location /health {
            proxy_pass http://dkz-copilot:3050/health;
        }
    }
}
