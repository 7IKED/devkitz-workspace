# Copilot Setup Steps — DEVKiTZ
# WICHTIG: Job-Name MUSS "copilot-setup-steps" sein (GitHub Requirement)
# Konfiguriert das ephemere Cloud-Environment des Copilot Coding Agents

name: "Copilot Setup Steps"

on:
  workflow_dispatch:

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        continue-on-error: true
        run: |
          if [ -f "package.json" ]; then
            npm ci 2>/dev/null || npm install 2>/dev/null || true
          fi

      - name: Verify DEVKiTZ environment
        run: |
          echo "=== DEVKiTZ Copilot Environment ==="
          echo "Node: $(node -v)"
          echo "NPM: $(npm -v)"
          echo ""
          echo "=== Module Count ==="
          MODULE_COUNT=$(find 01_PROJECTS/01_dashboard/modules -maxdepth 1 -type d 2>/dev/null | wc -l)
          echo "Dashboard Modules: $MODULE_COUNT"
          echo ""
          echo "=== Shared Scripts ==="
          ls 01_PROJECTS/01_dashboard/shared/dkz-*.js 2>/dev/null | head -10 || echo "None found"
          echo ""
          echo "=== features.json ==="
          if [ -f "01_PROJECTS/01_dashboard/features.json" ]; then
            echo "OK — features.json exists"
          else
            echo "MISSING — features.json not found"
          fi
          echo ""
          echo "=== Skills ==="
          SKILL_COUNT=$(find .agents/skills -name "SKILL.md" 2>/dev/null | wc -l)
          echo "Skills: $SKILL_COUNT"
          echo ""
          echo "=== Workflows ==="
          WF_COUNT=$(find .agents/workflows -name "*.md" 2>/dev/null | wc -l)
          echo "Workflows: $WF_COUNT"
          echo ""
          echo "=== Ready for Copilot Coding Agent ==="
