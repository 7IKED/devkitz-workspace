name: Deploy Dashboard to VPS

on:
  push:
    branches: [main]
    paths:
      - '01_PROJECTS/01_dashboard/**'
      - '.github/workflows/deploy-dashboard.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to KVM8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete --exclude='.git' --exclude='node_modules'
          path: 01_PROJECTS/01_dashboard/
          remote_path: /var/www/devkitz-dashboard/
          remote_host: ${{ secrets.VPS_HOST }}
          remote_user: ${{ secrets.VPS_USER }}
          remote_key: ${{ secrets.VPS_SSH_KEY }}

      - name: Verify Deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "=== Deployment Check ==="
            ls -la /var/www/devkitz-dashboard/hub/
            echo "Module Count: $(ls -d /var/www/devkitz-dashboard/modules/*/ | wc -l)"
            echo "=== nginx reload ==="
            sudo nginx -t && sudo systemctl reload nginx
            echo "=== DONE ==="
