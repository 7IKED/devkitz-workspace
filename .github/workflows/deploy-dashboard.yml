name: Deploy Dashboard to VPS

on:
  push:
    branches: [main]
    paths:
      - '01_PROJECTS/01_dashboard/**'
      - '.github/workflows/deploy-dashboard.yml'
  workflow_dispatch:

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    name: Check VPS Secrets
    outputs:
      has_secrets: ${{ steps.check.outputs.has_secrets }}
    steps:
      - name: Check if VPS secrets are configured
        id: check
        run: |
          if [ -n "${{ secrets.VPS_HOST }}" ] && [ -n "${{ secrets.VPS_SSH_KEY }}" ]; then
            echo "has_secrets=true" >> $GITHUB_OUTPUT
            echo "VPS secrets found"
          else
            echo "has_secrets=false" >> $GITHUB_OUTPUT
            echo "::notice::VPS secrets not configured. Skipping deploy. Set VPS_HOST, VPS_USER, VPS_SSH_KEY in repo Settings > Secrets."
          fi

  deploy:
    runs-on: ubuntu-latest
    name: Deploy to KVM8
    needs: check-secrets
    if: needs.check-secrets.outputs.has_secrets == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete --exclude='.git' --exclude='node_modules'
          path: 01_PROJECTS/01_dashboard/
          remote_path: /var/www/devkitz-dashboard/
          remote_host: ${{ secrets.VPS_HOST }}
          remote_user: ${{ secrets.VPS_USER }}
          remote_key: ${{ secrets.VPS_SSH_KEY }}

      - name: Verify Deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "=== Deployment Check ==="
            ls -la /var/www/devkitz-dashboard/hub/
            echo "Module Count: $(ls -d /var/www/devkitz-dashboard/modules/*/ | wc -l)"
            echo "=== nginx reload ==="
            sudo nginx -t && sudo systemctl reload nginx
            echo "=== DONE ==="
