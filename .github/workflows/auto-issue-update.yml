name: Auto Update Issues on Commit

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  update-issues:
    runs-on: ubuntu-latest
    name: Link commits to issues

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 5

      - name: Parse commits and update issues
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== Parsing recent commits ==="

          git log -5 --pretty=format:"%h %s" | while IFS= read -r line; do
            echo "Commit: $line"

            HASH=$(echo "$line" | awk '{print $1}')
            MSG=$(echo "$line" | cut -d' ' -f2-)

            # Extract issue numbers (POSIX compatible)
            ISSUES=$(echo "$line" | grep -oE '#[0-9]+' | tr -d '#' || true)

            for ISSUE in $ISSUES; do
              if [ -n "$ISSUE" ]; then
                echo "  Linking to issue #$ISSUE"
                gh issue comment "$ISSUE" \
                  --body "Commit [\`$HASH\`](https://github.com/${{ github.repository }}/commit/${{ github.sha }}) referenced this issue: $MSG" \
                  2>/dev/null || echo "  Skipped issue #$ISSUE (not found or closed)"
              fi
            done
          done
          echo "=== Done ==="

      - name: Issue stats
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TOTAL=$(gh issue list --state open --json number --jq length 2>/dev/null || echo 0)
          echo "Open Issues: $TOTAL"

