name: DkZ Monorepo Auto-Release

on:
  # Nur manuell triggern — Scripts noch in Entwicklung
  workflow_dispatch:

jobs:
  check-scripts:
    runs-on: ubuntu-latest
    name: Validate Scripts
    outputs:
      scripts_ready: ${{ steps.check.outputs.scripts_ready }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check if required scripts exist
        id: check
        run: |
          MISSING=0
          for script in ".agents/scripts/media-brander.js" ".agents/scripts/deepkeep.js" ".agents/scripts/sitemap-generator.js"; do
            if [ ! -f "$script" ]; then
              echo "::warning::Missing script: $script"
              MISSING=1
            fi
          done
          if [ $MISSING -eq 0 ]; then
            echo "scripts_ready=true" >> $GITHUB_OUTPUT
          else
            echo "scripts_ready=false" >> $GITHUB_OUTPUT
            echo "::notice::Some scripts are missing. Skipping release pipeline. Create the missing scripts first."
          fi

  release:
    runs-on: ubuntu-latest
    name: Build and Release
    needs: check-scripts
    if: needs.check-scripts.outputs.scripts_ready == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install --ignore-scripts 2>/dev/null || true

      - name: Run Media Brander
        run: node .agents/scripts/media-brander.js 01_PROJECTS/

      - name: Run DeepKeep Sanitizer
        run: node .agents/scripts/deepkeep.js 01_PROJECTS/

      - name: Generate Sitemap
        run: node .agents/scripts/sitemap-generator.js

      - name: Deploy to VPS
        if: ${{ secrets.VPS_HOST != '' }}
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          HOST: ${{ secrets.VPS_HOST }}
          USER: ${{ secrets.VPS_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $HOST >> ~/.ssh/known_hosts 2>/dev/null
          rsync -avz --delete -e "ssh -i ~/.ssh/id_rsa" ./01_PROJECTS/ $USER@$HOST:/var/www/devkitz-dashboard/

      - name: Create Release Log
        run: |
          mkdir -p .agents/logs/releases
          echo "## Release: $(date +'%Y-%m-%d %H:%M')" > .agents/logs/releases/latest.md
          echo "Auto-Release Pipeline - DkZ Monorepo" >> .agents/logs/releases/latest.md
          echo "Modules: $(ls -d 01_PROJECTS/01_dashboard/modules/*/ 2>/dev/null | wc -l)" >> .agents/logs/releases/latest.md

      - name: Push Release Log
        run: |
          git config --global user.name 'DkZ Auto-Release Bot'
          git config --global user.email 'bot@devkitz.eu'
          git add .agents/logs/releases/latest.md
          git commit -m "docs: Auto-Release Log aktualisiert" || echo "No changes"
          git push
