<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Local-first Project Management Tool">
    <title>DkZ devkitz V2</title>

    <!-- PWA -->
    <meta name="theme-color" content="#121212">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="app-shell">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <h3>DkZ devkitz</h3>
            </div>
            <nav class="flex gap-sm">
                <button class="btn btn-ghost" data-action="nav:dashboard">Home</button>
                <button class="btn btn-ghost" data-action="nav:settings">Settings</button>
                <button class="btn btn-primary" data-action="project:new">+ New</button>
            </nav>
        </header>

        <!-- Main Content Area -->
        <main id="app-main" class="main-content container">
            <!-- Views are injected here -->
            <div id="view-dashboard" class="view hidden">
                <h2>Dashboard</h2>
                <div id="project-list" class="grid gap-md"></div>
            </div>

            <div id="view-editor" class="view hidden">
                <div class="flex justify-between items-center mb-md">
                    <input type="text" id="project-title" class="h2-input" placeholder="Project Title">
                    <div class="actions flex gap-sm">
                        <button class="btn btn-ghost" data-action="editor:save">Save</button>
                        <button class="btn btn-ghost" data-action="editor:export">Export</button>
                    </div>
                </div>
                <!-- Editor Container (Smart or Extended) -->
                <div id="editor-container"></div>
            </div>

            <div id="view-settings" class="view hidden">
                <h2>Settings</h2>
                <div class="card grid gap-md">
                    <label>
                        Theme
                        <select id="setting-theme">
                            <option value="light">Light</option>
                            <option value="dark">Dark</option>
                            <option value="neon">Neon</option>
                        </select>
                    </label>
                    <label>
                        Editor Mode
                        <select id="setting-mode">
                            <option value="smart">Smart (Markdown)</option>
                            <option value="extended">Extended (Rich Text)</option>
                        </select>
                    </label>
                    <div class="drive-sync">
                        <input type="text" id="drive-client-id" placeholder="Client ID (Safe to store locally)"
                            style="width: 100%; margin-bottom: 0.5rem; padding: 0.5rem;">
                        <button class="btn btn-primary" id="btn-connect-drive" data-action="drive:connect">Connect
                            Drive</button>
                        <p class="text-sm text-muted">See Docs for setup guide.</p>
                    </div>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>v2.0.0 &copy; 2026 DkZ Systems</p>
        </footer>
    </div>

    <!-- Scripts -->
    <script type="module" src="js/core/app.js"></script>
</body>

</html>
