<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DkZ devkitz Smart v2</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="./css/main.css">
</head>

<body>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar"
            style="background: var(--bg-secondary); border-right: 1px solid var(--border-color); padding: 1rem;">
            <h1 style="color: var(--text-primary); font-size: 1.2rem; margin-bottom: 2rem;">DkZ devkitz <span
                    style="color: var(--accent-primary); font-size: 0.8em;">2.0</span></h1>

            <nav style="display: flex; flex-direction: column; gap: 0.5rem;">
                <button
                    style="text-align: left; padding: 0.5rem; color: var(--text-secondary); border-radius: var(--radius-sm);">Dashboard</button>
                <button
                    style="text-align: left; padding: 0.5rem; color: var(--text-secondary); border-radius: var(--radius-sm);">Projects</button>
                <button
                    style="text-align: left; padding: 0.5rem; color: var(--text-secondary); border-radius: var(--radius-sm);">Settings</button>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content" style="display: flex; flex-direction: column;">
            <!-- Header -->
            <header
                style="height: var(--header-height); border-bottom: 1px solid var(--border-color); display: flex; align-items: center; padding: 0 1.5rem; justify-content: space-between;">
                <h2 id="page-title">Dashboard</h2>
                <div class="actions">
                    <button
                        style="background: var(--accent-primary); color: #000; padding: 0.5rem 1rem; border-radius: var(--radius-sm); font-weight: 600;">+
                        New Project</button>
                </div>
            </header>

            <!-- Workspace -->
            <div id="workspace" style="flex: 1; padding: 1.5rem; overflow-y: auto;">
                <p style="color: var(--text-muted);">Initializing system...</p>
            </div>
        </main>
    </div>

    <!-- JS Modules -->
    <script type="module" src="./js/core/App.js"></script>
</body>

</html>
