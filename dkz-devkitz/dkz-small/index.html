<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <title>DkZ devkitz SMALL</title>
    <style>
        :root {
            --bg: #111;
            --text: #eee;
            --accent: #0f0;
            --font: 'Courier New', monospace;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            color: var(--accent);
            border-bottom: 2px solid var(--accent);
            padding-bottom: 10px;
        }

        .card {
            border: 1px solid #333;
            padding: 15px;
            margin-bottom: 10px;
            background: #222;
        }

        button {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 8px 16px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.8;
        }

        textarea {
            width: 100%;
            height: 100px;
            background: #000;
            color: #0f0;
            border: 1px solid #333;
            padding: 10px;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <h1>DkZ devkitz [SMALL]</h1>
    <p>Portable Edition v1.0 • No Server Required</p>

    <div id="app">
        <!-- Dashboard -->
        <div class="card">
            <h3>Quick Note / Draft</h3>
            <textarea id="quick-input" placeholder="Type something..."></textarea>
            <div style="margin-top:10px; display:flex; justify-content:space-between;">
                <span id="status">Ready</span>
                <button onclick="DkZ.save()">SAVE</button>
            </div>
        </div>

        <div class="card">
            <h3>Stored Items</h3>
            <ul id="list" style="padding-left: 20px;"></ul>
            <button onclick="DkZ.clear()" style="background:#f00; margin-top:10px;">RESET</button>
        </div>
    </div>

    <script>
        // IIFE / Singleton Pattern
        const DkZ = (() => {
            const STORAGE_KEY = 'dkz_small_data';

            function init() {
                load();
                console.log('DkZ Small Initialized');
            }

            function save() {
                const input = document.getElementById('quick-input');
                const val = input.value.trim();
                if (!val) return;

                const data = getStored();
                data.push({ id: Date.now(), text: val, date: new Date().toLocaleString() });
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));

                input.value = '';
                setStatus('Saved!');
                render();
                setTimeout(() => setStatus('Ready'), 2000);
            }

            function getStored() {
                return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            }

            function load() {
                render();
            }

            function render() {
                const list = document.getElementById('list');
                const data = getStored();

                list.innerHTML = data.map(item => `
                    <li style="margin-bottom:5px;">
                        <small>[${item.date}]</small> <br>
                        ${item.text}
                    </li>
                `).join('');
            }

            function clear() {
                if (confirm('Delete all?')) {
                    localStorage.removeItem(STORAGE_KEY);
                    render();
                    setStatus('Cleared');
                }
            }

            function setStatus(msg) {
                document.getElementById('status').innerText = msg;
            }

            return { init, save, clear };
        })();

        // Auto-Init
        document.addEventListener('DOMContentLoaded', DkZ.init);
    </script>
</body>

</html>
